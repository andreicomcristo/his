<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="header(pageTitle)">
    <div class="header-mobile-wrapper">
        <div class="app-header__logo">
            <a th:href="@{/ui/home}" class="logo-src" title="HIS"></a>
            <button type="button" class="hamburger hamburger--elastic mobile-toggle-sidebar-nav">
                <span class="hamburger-box">
                    <span class="hamburger-inner"></span>
                </span>
            </button>
            <div class="app-header__menu">
                <span>
                    <button type="button" class="btn-icon btn-icon-only btn btn-primary btn-sm mobile-toggle-header-nav">
                        <span class="btn-icon-wrapper">
                            <i class="fa fa-ellipsis-v fa-w-6"></i>
                        </span>
                    </button>
                </span>
            </div>
        </div>
    </div>
    <div class="app-header"
         th:with="
            currentPage=${pageTitle != null and #strings.contains(pageTitle, '|') ? #strings.trim(#strings.substringAfter(pageTitle, '|')) : pageTitle},
            currentPath=${currentPage != null and !#strings.isEmpty(currentPage) ? 'Home > ' + #strings.replace(currentPage, ' - ', ' > ') : 'Home'}">
        <div class="page-title-heading">
            HIS - Gestao Hospitalar
            <div class="page-title-subheading" th:text="${currentPath}">Home</div>
        </div>
        <div class="app-header-right">
            <div class="header-btn-lg pr-0">
                <div class="header-dots">
                    <a th:href="@{/ui/home}" class="p-0 mr-2 btn btn-link"><i class="pe-7s-home"></i></a>
                    <a href="#" class="p-0 btn btn-link"><i class="pe-7s-bell"></i></a>
                </div>
            </div>
            <div class="header-btn-lg pr-0">
                <div class="widget-content p-0">
                    <div class="widget-content-wrapper">
                        <div class="widget-content-left">
                            <div class="btn-group">
                                <a data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" class="p-0 btn">
                                    <img width="46" class="rounded" th:src="${currentUser.avatarUrl}" alt="avatar">
                                    <i class="fa fa-angle-down ml-2 opacity-8"></i>
                                </a>
                                <div tabindex="-1" role="menu" aria-hidden="true"
                                     class="rm-pointers dropdown-menu-lg dropdown-menu dropdown-menu-right">
                                    <div class="dropdown-menu-header">
                                        <div class="dropdown-menu-header-inner bg-primary">
                                            <div class="menu-header-content text-left">
                                                <div class="widget-content p-0">
                                                    <div class="widget-content-wrapper">
                                                        <div class="widget-content-left mr-3">
                                                            <img width="42" class="rounded-circle"
                                                                 th:src="${currentUser.avatarUrl}" alt="avatar">
                                                        </div>
                                                        <div class="widget-content-left">
                                                            <div class="widget-heading" th:text="${currentUser.name}">USER</div>
                                                            <div class="widget-subheading" th:text="${currentUser.company}">Default Company</div>
                                                        </div>
                                                        <div class="widget-content-right mr-2">
                                                            <div class="d-flex flex-column align-items-end">
                                                                <a th:href="@{/ui/escolher-unidade}" class="btn-pill btn-shadow btn btn-light mb-2">
                                                                    <i class="fa fa-exchange mr-1"></i> Trocar unidade
                                                                </a>
                                                                <form th:action="@{/logout}" method="post" class="d-inline">
                                                                    <button type="submit" class="btn-pill btn-shadow btn-shine btn btn-focus">
                                                                        <i class="fa fa-sign-out text-danger"></i> Sair
                                                                    </button>
                                                                </form>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="widget-content-left ml-2">
                            <div class="widget-heading" th:text="${currentUser.name}">USER</div>
                            <div class="widget-subheading" th:text="${currentUser.company}">Default Company</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
