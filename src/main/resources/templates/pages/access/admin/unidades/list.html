<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administração - Unidades', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Unidades</h5>
                <div class="btn-group btn-group-sm" role="group">
                    <a class="btn btn-primary"
                       th:href="@{/ui/admin/unidades/novo}"
                       data-toggle="tooltip"
                       data-placement="top"
                       title="Adicionar uma nova unidade">
                        <i class="nav-link-icon lnr-plus-circle mr-2"></i>Adicionar
                    </a>
                </div>
            </div>

            <form method="get" th:action="@{/ui/admin/unidades}" class="mb-3">
                <div class="form-row">
                    <div class="form-group col-md-12">
                        <label class="filtro-label">Pesquisa</label>
                        <input type="text"
                               name="q"
                               class="form-control"
                               placeholder="Buscar por nome, sigla ou CNES"
                               th:value="${q}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 d-flex">
                        <button class="btn btn-sm btn-primary mr-2" type="submit">
                            <i class="nav-link-icon lnr-magnifier mr-2"></i>Buscar
                        </button>
                        <a class="btn btn-sm btn-secondary" th:href="@{/ui/admin/unidades}">
                            <i class="nav-link-icon lnr-cross mr-2"></i>Limpar
                        </a>
                    </div>
                </div>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Sigla</th>
                    <th>Tipo</th>
                    <th>Município</th>
                    <th>CNES</th>
                    <th>Status</th>
                    <th class="text-center">Opções</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${unidades}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.nome}"></td>
                    <td th:text="${u.sigla == null ? '-' : u.sigla}"></td>
                    <td th:text="${u.tipoUnidade == null ? '-' : u.tipoUnidade.descricao}"></td>
                    <td th:text="${u.municipio == null ? '-' : u.municipio.nome + ' - ' + u.municipio.unidadeFederativa.sigla}"></td>
                    <td th:text="${u.cnes}"></td>
                    <td>
                        <span class="badge" th:classappend="${u.ativo} ? 'badge-success' : 'badge-secondary'"
                              th:text="${u.ativo} ? 'ATIVA' : 'INATIVA'"></span>
                    </td>
                    <td class="text-center">
                        <div class="dropdown d-inline-block">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                    type="button"
                                    data-toggle="dropdown"
                                    aria-haspopup="true"
                                    aria-expanded="false">
                                <i class="nav-link-icon lnr-menu"></i>
                            </button>
                            <div class="dropdown-menu dropdown-menu-right">
                                <a class="dropdown-item" th:href="@{'/ui/admin/unidades/' + ${u.id} + '/fluxo'}">
                                    <i class="nav-link-icon lnr-list mr-2"></i><span>Fluxo</span>
                                </a>
                                <a class="dropdown-item" th:href="@{'/ui/admin/unidades/' + ${u.id} + '/editar'}">
                                    <i class="nav-link-icon lnr-pencil mr-2"></i><span>Editar</span>
                                </a>
                                <form th:action="@{'/ui/admin/unidades/' + ${u.id} + '/ativar-desativar'}"
                                      method="post"
                                      class="m-0">
                                    <button type="submit"
                                            class="dropdown-item"
                                            th:classappend="${u.ativo} ? ' text-warning' : ' text-success'">
                                        <i class="nav-link-icon lnr-lock mr-2"></i>
                                        <span th:text="${u.ativo} ? 'Desativar' : 'Ativar'"></span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</html>
