<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administração - Editar Unidade' : 'Administração - Nova Unidade', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title" th:text="${modoEdicao} ? 'Editar unidade' : 'Nova unidade'">Unidade</h5>
            </div>

            <form th:action="${modoEdicao} ? @{'/ui/admin/unidades/' + ${unidadeId}} : @{/ui/admin/unidades}"
                  method="post" th:object="${form}">

                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                    <div th:each="e : ${#fields.globalErrors()}" th:text="${e}"></div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Nome<span class="required-mark">*</span></label>
                        <input class="form-control"
                               type="text"
                               th:field="*{nome}"
                               placeholder="Informe o nome da unidade">
                        <small class="text-danger" th:errors="*{nome}"></small>
                    </div>
                    <div class="form-group col-md-3">
                        <label>Sigla</label>
                        <input class="form-control"
                               type="text"
                               th:field="*{sigla}"
                               maxlength="20"
                               placeholder="Informe a sigla">
                        <small class="text-danger" th:errors="*{sigla}"></small>
                    </div>
                    <div class="form-group col-md-3">
                        <label>CNES</label>
                        <input class="form-control"
                               type="text"
                               th:field="*{cnes}"
                               maxlength="20"
                               placeholder="Informe o CNES">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Tipo de unidade<span class="required-mark">*</span></label>
                        <select class="multiselect-dropdown form-control" th:field="*{tipoUnidadeId}">
                            <option value="">Selecione</option>
                            <option th:if="${tipoUnidadeLegado != null}"
                                    th:value="${tipoUnidadeLegado.id}"
                                    th:text="${tipoUnidadeLegado.descricao + ' (cancelado - legado)'}"></option>
                            <option th:each="item : ${tiposUnidade}"
                                    th:value="${item.id}"
                                    th:text="${item.descricao}"></option>
                        </select>
                        <small class="text-warning d-block" th:if="${tipoUnidadeLegado != null}">
                            Tipo legado cancelado: este valor pode ser mantido, mas novos vinculos devem usar tipo ativo.
                        </small>
                        <small class="text-danger" th:errors="*{tipoUnidadeId}"></small>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Unidade Federativa<span class="required-mark">*</span></label>
                        <select class="multiselect-dropdown form-control"
                                th:field="*{unidadeFederativaId}"
                                id="unidadeFederativaId">
                            <option value="">Selecione</option>
                            <option th:if="${ufLegado != null}"
                                    th:value="${ufLegado.id}"
                                    th:text="${ufLegado.descricao + ' - ' + ufLegado.sigla + ' (cancelado - legado)'}"></option>
                            <option th:each="item : ${ufs}"
                                    th:value="${item.id}"
                                    th:text="${item.descricao + ' - ' + item.sigla}"></option>
                        </select>
                        <small class="text-warning d-block" th:if="${ufLegado != null}">
                            UF legada cancelada: pode manter este valor, mas novos vinculos devem usar UF ativa.
                        </small>
                        <small class="text-danger" th:errors="*{unidadeFederativaId}"></small>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Município<span class="required-mark">*</span></label>
                        <select class="multiselect-dropdown form-control"
                                th:field="*{municipioId}"
                                id="municipioId"
                                th:attr="data-legado-id=${municipioLegado != null ? municipioLegado.id : ''},data-legado-label=${municipioLegado != null ? municipioLegado.descricao + ' (cancelado - legado)' : ''}">
                            <option value="">Selecione</option>
                            <option th:if="${municipioLegado != null}"
                                    th:value="${municipioLegado.id}"
                                    th:text="${municipioLegado.descricao + ' (cancelado - legado)'}"></option>
                            <option th:each="municipio : ${municipios}"
                                    th:value="${municipio.id}"
                                    th:text="${municipio.descricao}"></option>
                        </select>
                        <small class="text-warning d-block" th:if="${municipioLegado != null}">
                            Municipio legado cancelado: pode manter este valor, mas novos vinculos devem usar municipio ativo.
                        </small>
                        <small class="text-danger" th:errors="*{municipioId}"></small>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-12 mb-0">
                        <div class="d-flex">
                            <button type="submit" class="btn btn-primary btn-sm mr-2">
                                <i class="nav-link-icon lnr-checkmark-circle mr-2"></i>Salvar
                            </button>
                            <a th:href="@{/ui/admin/unidades}" class="btn btn-secondary btn-sm">
                                <i class="nav-link-icon lnr-exit mr-2"></i>Voltar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var ufSelect = document.getElementById('unidadeFederativaId');
            var municipioSelect = document.getElementById('municipioId');

            function resetMunicipios() {
                municipioSelect.innerHTML = '<option value="">Selecione</option>';
                if (window.jQuery && window.jQuery.fn && window.jQuery.fn.select2) {
                    window.jQuery(municipioSelect).trigger('change');
                }
            }

            function loadMunicipios(ufId, selectedMunicipioId) {
                resetMunicipios();
                if (!ufId) {
                    return;
                }
                var legacyId = municipioSelect.getAttribute('data-legado-id');
                var legacyLabel = municipioSelect.getAttribute('data-legado-label');
                fetch('/ui/admin/municipios/por-uf/' + ufId)
                    .then(function (response) { return response.json(); })
                    .then(function (items) {
                        var selectedExists = false;
                        items.forEach(function (item) {
                            var option = document.createElement('option');
                            option.value = item.id;
                            option.textContent = item.descricao;
                            if (selectedMunicipioId && String(selectedMunicipioId) === String(item.id)) {
                                option.selected = true;
                                selectedExists = true;
                            }
                            municipioSelect.appendChild(option);
                        });
                        if (selectedMunicipioId
                                && legacyId
                                && String(selectedMunicipioId) === String(legacyId)
                                && !selectedExists) {
                            var legacyOption = document.createElement('option');
                            legacyOption.value = legacyId;
                            legacyOption.textContent = legacyLabel || 'Municipio cancelado - legado';
                            legacyOption.selected = true;
                            municipioSelect.appendChild(legacyOption);
                        }
                        if (window.jQuery && window.jQuery.fn && window.jQuery.fn.select2) {
                            window.jQuery(municipioSelect).trigger('change');
                        }
                    });
            }

            if (ufSelect && municipioSelect) {
                var selectedMunicipioId = municipioSelect.value;
                if (ufSelect.value) {
                    loadMunicipios(ufSelect.value, selectedMunicipioId);
                } else {
                    resetMunicipios();
                }
                if (window.jQuery && window.jQuery.fn) {
                    window.jQuery(ufSelect).on('change', function () {
                        loadMunicipios(this.value, null);
                    });
                } else {
                    ufSelect.addEventListener('change', function () {
                        loadMunicipios(this.value, null);
                    });
                }
            }
        });
    </script>
</th:block>
</html>
