<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administracao - Editar Cargo' : 'Administracao - Novo Cargo', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title" th:text="${modoEdicao} ? 'Editar cargo de colaborador' : 'Novo cargo de colaborador'">Cargo</h5>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form method="post"
                  th:object="${form}"
                  th:action="${modoEdicao} ? @{'/ui/admin/cargos-colaborador/' + ${itemId}} : @{/ui/admin/cargos-colaborador}">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Codigo<span class="required-mark">*</span></label>
                        <input type="text" class="form-control" th:field="*{codigo}">
                        <small class="text-danger" th:errors="*{codigo}"></small>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Tipo<span class="required-mark">*</span></label>
                        <select class="form-control" th:field="*{tipoCargoId}">
                            <option value="">Selecione</option>
                            <option th:each="tipo : ${tipos}"
                                    th:value="${tipo.id}"
                                    th:text="${tipo.descricao + ' (' + tipo.codigo + ')'}">ASSISTENCIAL</option>
                        </select>
                        <small class="text-danger" th:errors="*{tipoCargoId}"></small>
                    </div>
                    <div class="form-group col-md-2 d-flex align-items-center">
                        <div class="form-check mt-4">
                            <input type="checkbox" class="form-check-input" th:field="*{ativo}">
                            <label class="form-check-label" for="ativo">Ativo</label>
                        </div>
                    </div>
                    <div class="form-group col-md-3 d-flex align-items-center">
                        <div class="form-check mt-4">
                            <input type="checkbox" class="form-check-input" th:field="*{exigeEspecialidadeAgendamento}">
                            <label class="form-check-label" for="exigeEspecialidadeAgendamento">Exige especialidade no agendamento</label>
                        </div>
                    </div>
                    <div class="form-group col-md-8">
                        <label>Descricao<span class="required-mark">*</span></label>
                        <input type="text" class="form-control" th:field="*{descricao}">
                        <small class="text-danger" th:errors="*{descricao}"></small>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-sm">Salvar</button>
                <a th:href="@{/ui/admin/cargos-colaborador}" class="btn btn-secondary btn-sm">Voltar</a>
            </form>
        </div>
    </div>
</th:block>
</html>
