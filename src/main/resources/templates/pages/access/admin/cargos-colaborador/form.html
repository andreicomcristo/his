<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administração - Editar Cargo' : 'Administração - Novo Cargo', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title" th:text="${modoEdicao} ? 'Editar cargo de colaborador' : 'Novo cargo de colaborador'">Cargo</h5>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form method="post"
                  th:object="${form}"
                  th:action="${modoEdicao} ? @{'/ui/admin/cargos-colaborador/' + ${itemId}} : @{/ui/admin/cargos-colaborador}">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Código<span class="required-mark">*</span></label>
                        <input type="text"
                               class="form-control"
                               th:field="*{codigo}"
                               placeholder="Informe o código do cargo">
                        <small class="text-danger" th:errors="*{codigo}"></small>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Tipo<span class="required-mark">*</span></label>
                        <select class="multiselect-dropdown form-control" th:field="*{tipoCargoId}">
                            <option value="">Selecione</option>
                            <option th:each="tipo : ${tipos}"
                                    th:value="${tipo.id}"
                                    th:text="${tipo.descricao + ' (' + tipo.codigo + ')'}">ASSISTENCIAL</option>
                        </select>
                        <small class="text-danger" th:errors="*{tipoCargoId}"></small>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Descrição<span class="required-mark">*</span></label>
                        <input type="text"
                               class="form-control"
                               th:field="*{descricao}"
                               placeholder="Informe a descrição do cargo">
                        <small class="text-danger" th:errors="*{descricao}"></small>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-2 d-flex align-items-center">
                        <div class="form-check mt-4">
                            <input type="checkbox" class="form-check-input" th:field="*{ativo}">
                            <label class="form-check-label" for="ativo">Ativo</label>
                        </div>
                    </div>
                    <div class="form-group col-md-4 d-flex align-items-center">
                        <div class="form-check mt-4">
                            <input type="checkbox" class="form-check-input" th:field="*{exigeEspecialidadeAgendamento}">
                            <label class="form-check-label" for="exigeEspecialidadeAgendamento">Exige especialidade no agendamento</label>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-12 mb-0">
                        <div class="d-flex">
                            <button type="submit" class="btn btn-primary btn-sm mr-2">
                                <i class="nav-link-icon lnr-checkmark-circle mr-2"></i>Salvar
                            </button>
                            <a th:href="@{/ui/admin/cargos-colaborador}" class="btn btn-secondary btn-sm">
                                <i class="nav-link-icon lnr-exit mr-2"></i>Voltar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</th:block>
</html>
