<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administração - Tipos de Unidade', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Tipos de unidade</h5>
                <div class="btn-group btn-group-sm" role="group">
                    <a class="btn btn-primary"
                       th:href="@{/ui/admin/tipos-unidade/novo}"
                       data-toggle="tooltip"
                       data-placement="top"
                       title="Adicionar um novo tipo de unidade">
                        <i class="nav-link-icon lnr-plus-circle mr-2"></i>Adicionar</a>
                </div>
            </div>

            <form method="get" class="mb-3">
                <div class="form-row">
                    <div class="form-group col-md-8">
                        <label class="filtro-label">Pesquisa</label>
                        <input type="text"
                               name="q"
                               class="form-control"
                               placeholder="Buscar por código ou descrição"
                               th:value="${q}">
                    </div>
                    <div class="form-group col-md-4">
                        <label class="filtro-label">Situação</label>
                        <select name="ativo" class="multiselect-dropdown form-control">
                            <option value="" th:selected="${ativo == null}">Todos</option>
                            <option value="true" th:selected="${ativo != null and ativo}">Ativo</option>
                            <option value="false" th:selected="${ativo != null and !ativo}">Inativo</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 d-flex">
                        <button class="btn btn-sm btn-primary mr-2" type="submit">
                            <i class="nav-link-icon lnr-magnifier mr-2"></i>Buscar
                        </button>
                        <a class="btn btn-sm btn-secondary" th:href="@{/ui/admin/tipos-unidade}">
                            <i class="nav-link-icon lnr-cross mr-2"></i>Limpar
                        </a>
                    </div>
                </div>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Descrição</th>
                    <th class="text-center">Ativo</th>
                    <th class="text-center">Opções</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.codigo}"></td>
                    <td th:text="${item.descricao}"></td>
                    <td class="text-center" th:text="${item.ativo ? 'SIM' : 'NÃO'}"></td>
                    <td class="text-center">
                        <div class="dropdown d-inline-block">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                    type="button"
                                    data-toggle="dropdown"
                                    aria-haspopup="true"
                                    aria-expanded="false">
                                <i class="nav-link-icon lnr-menu"></i>
                            </button>
                            <div class="dropdown-menu dropdown-menu-right">
                                <a class="dropdown-item"
                                   th:href="@{'/ui/admin/tipos-unidade/' + ${item.id} + '/editar'}">
                                    <i class="nav-link-icon lnr-pencil mr-2"></i><span>Editar</span>
                                </a>
                                <form method="post"
                                      class="m-0"
                                      th:action="@{'/ui/admin/tipos-unidade/' + ${item.id} + '/excluir'}">
                                    <button type="submit"
                                            class="dropdown-item text-danger"
                                            onclick="return confirm('Excluir tipo de unidade?');">
                                        <i class="nav-link-icon lnr-trash mr-2"></i><span>Excluir</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</html>
