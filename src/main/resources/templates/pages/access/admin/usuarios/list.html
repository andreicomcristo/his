<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administracao - Usuarios', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Usuarios</h5>
                <div>
                    <form th:action="@{/ui/admin/usuarios/reset-fluxo-assistencial}"
                          method="post"
                          class="d-inline"
                          onsubmit="return confirm('Confirmar reset do fluxo assistencial? Isso apagará atendimentos, triagens, episodios, entradas e timeline. Pacientes serão preservados.');">
                        <button class="btn btn-outline-danger btn-sm mr-2" type="submit">Reset fluxo assistencial</button>
                    </form>
                    <form th:action="@{/ui/admin/usuarios/reset-fluxo-agendamento}"
                          method="post"
                          class="d-inline"
                          onsubmit="return confirm('Confirmar reset do fluxo de agendamento? Isso apagará agendas, slots, vinculos, historicos e status de agendamento. Especialidades serão preservadas.');">
                        <button class="btn btn-outline-danger btn-sm mr-2" type="submit">Reset fluxo agendamento</button>
                    </form>
                    <a class="btn btn-primary btn-sm" th:href="@{/ui/admin/usuarios/novo}">Novo usuario</a>
                </div>
            </div>
            <form method="get" th:action="@{/ui/admin/usuarios}" class="form-inline mb-3">
                <input type="text" name="q" class="form-control mr-2" placeholder="Username/email" th:value="${q}">
                <button class="btn btn-outline-secondary btn-sm" type="submit">Buscar</button>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Keycloak ID</th>
                    <th>Status</th>
                    <th>Acoes</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.id}"></td>
                    <td><a th:href="@{'/ui/admin/usuarios/' + ${u.id}}" th:text="${u.username}"></a></td>
                    <td th:text="${u.email}"></td>
                    <td><small th:text="${u.keycloakId}"></small></td>
                    <td>
                        <span class="badge" th:classappend="${u.ativo} ? 'badge-success' : 'badge-secondary'"
                              th:text="${u.ativo} ? 'ATIVO' : 'INATIVO'"></span>
                    </td>
                    <td>
                        <form th:action="@{'/ui/admin/usuarios/' + ${u.id} + '/provisionar-keycloak'}"
                              method="post"
                              class="d-inline">
                            <button class="btn btn-sm"
                                    th:classappend="${u.keycloakId != null and #strings.startsWith(u.keycloakId, 'pending:')} ? 'btn-warning' : 'btn-outline-primary'"
                                    type="submit"
                                    th:text="${u.keycloakId != null and #strings.startsWith(u.keycloakId, 'pending:')} ? 'Provisionar Keycloak' : 'Recriar Keycloak'">
                                Provisionar Keycloak
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</html>
