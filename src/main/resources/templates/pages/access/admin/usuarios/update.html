<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/base :: layout('Administração - Usuário', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title">Usuário</h5>
            </div>
            <p class="mb-1">
                <strong>ID:</strong> <span th:text="${usuario.id}"></span>
                <strong>Keycloak ID:</strong> <small th:text="${usuario.keycloakId}"></small>
                <strong>Status:</strong>
                <span class="badge" th:classappend="${usuario.ativo} ? 'badge-success' : 'badge-secondary'"
                    th:text="${usuario.ativo} ? 'ATIVO' : 'INATIVO'">ATIVO</span>
            </p>
            <p class="mb-3"></p>
            <p class="mb-3">

            </p>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{'/ui/admin/usuarios/' + ${usuario.id} + '/dados'}" method="post"
                th:object="${usuarioForm}" class="mb-3">
                <div class="form-row">
                    <div class="form-group col-md-5">
                        <label>Username<span class="required-mark">*</span></label>
                        <input class="form-control" th:field="*{username}" placeholder="Informe o username">
                        <small class="text-danger" th:errors="*{username}"></small>
                    </div>
                    <div class="form-group col-md-5">
                        <label>Email</label>
                        <input class="form-control" type="email" th:field="*{email}" placeholder="Informe o e-mail">
                        <small class="text-danger" th:errors="*{email}"></small>
                    </div>
                    <div class="form-group col-md-2 d-flex align-items-end">
                        <div class="form-check mb-2">
                            <input type="checkbox" class="form-check-input" th:field="*{ativo}">
                            <label class="form-check-label" for="ativo">Ativo</label>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 d-flex">
                        <button type="submit" class="btn btn-primary btn-sm mr-1">
                            <i class="nav-link-icon lnr-checkmark-circle mr-2"></i>Salvar dados
                        </button>
                        <a th:href="@{/ui/admin/usuarios}" class="btn btn-secondary btn-sm ml-2">
                        <i class="nav-link-icon lnr-exit mr-2"></i>Voltar
                    </a>
                    </div>
                </div>
            </form>
            <div class="d-flex flex-wrap align-items-center">
                <form th:action="@{'/ui/admin/usuarios/' + ${usuario.id} + '/provisionar-keycloak'}"
                      method="post"
                      class="m-0 mr-2">
                    <button class="btn btn-sm"
                            th:classappend="${usuario.keycloakId != null and #strings.startsWith(usuario.keycloakId, 'pending:')} ? 'btn-warning' : 'btn-outline-primary'"
                            type="submit"
                            th:text="${usuario.keycloakId != null and #strings.startsWith(usuario.keycloakId, 'pending:')} ? 'Provisionar no Keycloak' : 'Recriar no Keycloak'">
                        Provisionar no Keycloak
                    </button>
                </form>

                <form method="post"
                      class="m-0 mr-2"
                      th:if="${usuario.ativo}"
                      th:action="@{'/ui/admin/usuarios/' + ${usuario.id} + '/status'}">
                    <input type="hidden" name="ativo" value="false">
                    <button type="submit"
                            class="btn btn-sm btn-outline-warning"
                            onclick="return confirm('Desativar este usuário? Ele perderá acesso ao sistema.')">
                        Desativar usuário
                    </button>
                </form>
                <form method="post"
                      class="m-0 mr-2"
                      th:if="${!usuario.ativo}"
                      th:action="@{'/ui/admin/usuarios/' + ${usuario.id} + '/status'}">
                    <input type="hidden" name="ativo" value="true">
                    <button type="submit"
                            class="btn btn-sm btn-outline-success"
                            onclick="return confirm('Reativar este usuário?')">
                        Reativar usuário
                    </button>
                </form>

                <form method="post"
                      class="m-0"
                      th:action="@{'/ui/admin/usuarios/' + ${usuario.id} + '/excluir-definitivo'}">
                    <button type="submit"
                            class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Excluir definitivamente este usuário? Esta ação é permitida apenas quando não houver histórico operacional.')">
                        Excluir definitivamente
                    </button>
                </form>
            </div>
          
        </div>
    </div>

    <!-- DEPENDENDO PODE SER REMOVIDO, NÃO MEXER AINDA -->

    <!-- FIM -->
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div th:if="${vinculoColaborador != null}">
                <div class="d-flex justify-content-between align-items-center">

                <h6>Atuações por unidade</h6>
                <p class="text-muted mb-2">
                    Colaborador: <strong th:text="${vinculoColaborador.colaborador.nome}">COLABORADOR</strong>
                    CPF: <strong th:text="${vinculoColaborador.colaborador.cpf}">CPF</strong>
                </p>
                </div>

                <form th:action="@{'/ui/admin/usuarios/' + ${usuario.id} + '/atuacoes'}" method="post"
                    th:object="${atuacaoForm}" class="mb-3">
                    <div class="form-row">
                        <div class="form-group col-md-3">
                            <label>Unidade<span class="required-mark">*</span></label>
                            <select class="multiselect-dropdown form-control" th:field="*{unidadeId}">
                                <option value="">Selecione</option>
                                <option th:each="unidade : ${unidades}" th:value="${unidade.id}"
                                    th:text="${unidade.nome}"></option>
                            </select>
                            <small class="text-danger" th:errors="*{unidadeId}"></small>
                        </div>
                        <div class="form-group col-md-3">
                            <label>Função<span class="required-mark">*</span></label>
                            <select class="multiselect-dropdown form-control" th:field="*{funcaoUnidadeId}">
                                <option value="">Selecione</option>
                                <option th:each="funcao : ${funcoes}" th:value="${funcao.id}"
                                    th:text="${funcao.descricao + ' (' + funcao.tipoFuncao + ')'}"></option>
                            </select>
                            <small class="text-danger" th:errors="*{funcaoUnidadeId}"></small>
                        </div>
                        <div class="form-group col-md-3">
                            <label>Perfil<span class="required-mark">*</span></label>
                            <select class="multiselect-dropdown form-control" th:field="*{perfilId}">
                                <option value="">Selecione</option>
                                <option th:each="perfil : ${perfis}" th:value="${perfil.id}" th:text="${perfil.nome}">
                                </option>
                            </select>
                            <small class="text-danger" th:errors="*{perfilId}"></small>
                        </div>
                        <div class="form-group col-md-3">
                            <label>Especialidade</label>
                            <select class="multiselect-dropdown form-control" th:field="*{especialidadeId}">
                                <option value="">Sem especialidade</option>
                                <option th:each="especialidade : ${especialidades}" th:value="${especialidade.id}"
                                    th:text="${especialidade.descricao}"></option>
                            </select>
                            <small class="text-danger" th:errors="*{especialidadeId}"></small>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success btn-sm">
                        <i class="nav-link-icon lnr-arrow-down-circle mr-2"></i>Adicionar atuação
                    </button>
                    <a th:href="@{/ui/admin/colaboradores-atuacoes}" class="btn btn-secondary btn-sm ml-2">
                        <i class="nav-link-icon lnr-list mr-2"></i>Atuações
                    </a>
                </form>

                <table class="table table-sm table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Unidade</th>
                            <th>Função</th>
                            <th>Especialidade</th>
                            <th>Perfil</th>
                            <th>Ativo</th>
                            <th class="text-center">Opções</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(atuacoes)}">
                            <td colspan="7" class="text-muted">Nenhuma atuação cadastrada para este usuário.</td>
                        </tr>
                        <tr th:each="atuacao : ${atuacoes}">
                            <td th:text="${atuacao.id}"></td>
                            <td th:text="${atuacao.colaboradorUnidadeVinculo.unidade.nome}"></td>
                            <td th:text="${atuacao.funcaoUnidade.descricao}"></td>
                            <td th:text="${atuacao.especialidade != null ? atuacao.especialidade.descricao : '-'}"></td>
                            <td th:text="${atuacao.perfil.nome}"></td>
                            <td>
                                <span class="badge"
                                    th:classappend="${atuacao.ativo} ? 'badge-success' : 'badge-secondary'"
                                    th:text="${atuacao.ativo} ? 'ATIVO' : 'INATIVO'"></span>
                            </td>
                            <td class="text-center">
                                <div class="dropdown d-inline-block">
                                    <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button"
                                        data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                        <i class="nav-link-icon lnr-menu"></i>
                                    </button>
                                    <div class="dropdown-menu dropdown-menu-right">
                                        <a class="dropdown-item"
                                            th:href="@{'/ui/admin/colaboradores-atuacoes/' + ${atuacao.id} + '/editar'}">
                                            <i class="nav-link-icon lnr-pencil mr-2"></i><span>Editar</span>
                                        </a>
                                        <form method="post" class="m-0"
                                            th:action="@{'/ui/admin/usuarios/' + ${usuario.id} + '/atuacoes/' + ${atuacao.id} + '/remover'}">
                                            <button type="submit" class="dropdown-item text-danger"
                                                onclick="return confirm('Remover atuação?')">
                                                <i class="nav-link-icon lnr-trash mr-2"></i><span>Remover</span>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>

</html>
