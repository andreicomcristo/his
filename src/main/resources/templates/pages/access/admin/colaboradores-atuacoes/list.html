<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administracao - Atuacoes', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Atuacoes por unidade</h5>
                <a class="btn btn-primary btn-sm" th:href="@{/ui/admin/colaboradores-atuacoes/novo}">Nova atuacao</a>
            </div>

            <form method="get" class="mb-3">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label class="filtro-label"><strong>Busca</strong></label>
                        <input type="text" name="q" class="form-control"
                               placeholder="Buscar por colaborador, unidade, funcao, perfil ou especialidade" th:value="${q}">
                    </div>
                    <div class="form-group col-md-3">
                        <label class="filtro-label"><strong>Situacao</strong></label>
                        <select name="ativo" class="form-control">
                            <option value="" th:selected="${ativo == null}">TODOS</option>
                            <option value="true" th:selected="${ativo != null and ativo}">ATIVO</option>
                            <option value="false" th:selected="${ativo != null and !ativo}">INATIVO</option>
                        </select>
                    </div>
                    <div class="form-group col-md-2 d-flex align-items-end">
                        <button class="btn btn-outline-secondary btn-sm btn-block" type="submit">Buscar</button>
                    </div>
                    <div class="form-group col-md-2 d-flex align-items-end">
                        <a class="btn btn-outline-secondary btn-sm btn-block" th:href="@{/ui/admin/colaboradores-atuacoes}">Limpar</a>
                    </div>
                </div>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Unidade</th>
                    <th>Colaborador</th>
                    <th>Funcao</th>
                    <th>Especialidade</th>
                    <th>Perfil</th>
                    <th>Vigencia</th>
                    <th>Ativo</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.colaboradorUnidadeVinculo.unidade.nome}"></td>
                    <td th:text="${item.colaboradorUnidadeVinculo.colaborador.nome}"></td>
                    <td th:text="${item.funcaoUnidade.descricao}"></td>
                    <td th:text="${item.especialidade != null ? item.especialidade.descricao : '-'}"></td>
                    <td th:text="${item.perfil.nome}"></td>
                    <td>
                        <span th:text="${item.inicioVigencia != null ? #temporals.format(item.inicioVigencia, 'dd/MM/yyyy') : '-'}"></span>
                        <span> ate </span>
                        <span th:text="${item.fimVigencia != null ? #temporals.format(item.fimVigencia, 'dd/MM/yyyy') : '-'}"></span>
                    </td>
                    <td th:text="${item.ativo ? 'SIM' : 'NAO'}"></td>
                    <td class="text-right">
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{'/ui/admin/colaboradores-atuacoes/' + ${item.id} + '/editar'}">Editar</a>
                        <form method="post" class="d-inline"
                              th:action="@{'/ui/admin/colaboradores-atuacoes/' + ${item.id} + '/excluir'}">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Excluir atuacao?');">Excluir</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</html>
