<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administracao - Colaboradores', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Colaboradores</h5>
                <a class="btn btn-primary btn-sm" th:href="@{/ui/admin/colaboradores/novo}">Novo colaborador</a>
            </div>

            <form method="get" class="mb-3">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label class="filtro-label"><strong>Busca</strong></label>
                        <input type="text" name="q" class="form-control"
                               placeholder="Buscar por nome, CPF ou cargo" th:value="${q}">
                    </div>
                    <div class="form-group col-md-3">
                        <label class="filtro-label"><strong>Situacao</strong></label>
                        <select name="ativo" class="form-control">
                            <option value="" th:selected="${ativo == null}">TODOS</option>
                            <option value="true" th:selected="${ativo != null and ativo}">ATIVO</option>
                            <option value="false" th:selected="${ativo != null and !ativo}">INATIVO</option>
                        </select>
                    </div>
                    <div class="form-group col-md-2 d-flex align-items-end">
                        <button class="btn btn-outline-secondary btn-sm btn-block" type="submit">Buscar</button>
                    </div>
                    <div class="form-group col-md-2 d-flex align-items-end">
                        <a class="btn btn-outline-secondary btn-sm btn-block" th:href="@{/ui/admin/colaboradores}">Limpar</a>
                    </div>
                </div>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Cargo</th>
                    <th>Usuario vinculado</th>
                    <th>Ativo</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.nome}"></td>
                    <td th:text="${item.cpf != null ? item.cpf : '-'}"></td>
                    <td th:text="${item.cargoColaborador != null ? item.cargoColaborador.descricao : '-'}"></td>
                    <td>
                        <span class="badge badge-success" th:if="${usuarioPorColaboradorId[item.id] != null}">SIM</span>
                        <span class="badge badge-secondary" th:if="${usuarioPorColaboradorId[item.id] == null}">NAO</span>
                        <span class="ml-2 text-muted" th:if="${usuarioPorColaboradorId[item.id] != null}"
                              th:text="${usuarioPorColaboradorId[item.id].usuario.username}">usuario</span>
                    </td>
                    <td th:text="${item.ativo ? 'SIM' : 'NAO'}"></td>
                    <td class="text-right">
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{'/ui/admin/colaboradores/' + ${item.id} + '/editar'}">Editar</a>
                        <form method="post" class="d-inline"
                              th:action="@{'/ui/admin/colaboradores/' + ${item.id} + '/excluir'}">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Excluir colaborador?');">Excluir</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</html>
