<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administração - Colaboradores', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Colaboradores</h5>
                <div class="btn-group btn-group-sm" role="group">
                    <a class="btn btn-primary"
                       th:href="@{/ui/admin/colaboradores/novo}"
                       data-toggle="tooltip"
                       data-placement="top"
                       title="Adicionar um novo colaborador">
                        <i class="nav-link-icon lnr-plus-circle mr-2"></i>Adicionar
                    </a>
                </div>
            </div>

            <form method="get" class="mb-3">
                <div class="form-row">
                    <div class="form-group col-md-8">
                        <label class="filtro-label">Pesquisa</label>
                        <input type="text" name="q" class="form-control"
                               placeholder="Buscar por nome, CPF ou cargo" th:value="${q}">
                    </div>
                    <div class="form-group col-md-4">
                        <label class="filtro-label">Situação</label>
                        <select name="ativo" class="form-control">
                            <option value="" th:selected="${ativo == null}">Todos</option>
                            <option value="true" th:selected="${ativo != null and ativo}">Ativo</option>
                            <option value="false" th:selected="${ativo != null and !ativo}">Inativo</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 d-flex">
                        <button class="btn btn-sm btn-primary mr-2" type="submit">
                            <i class="nav-link-icon lnr-magnifier mr-2"></i>Buscar
                        </button>
                        <a class="btn btn-sm btn-secondary" th:href="@{/ui/admin/colaboradores}">
                            <i class="nav-link-icon lnr-cross mr-2"></i>Limpar
                        </a>
                    </div>
                </div>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Cargo</th>
                    <th>Usuário vinculado</th>
                    <th>Ativo</th>
                    <th class="text-center">Opções</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.nome}"></td>
                    <td th:text="${item.cpf != null ? item.cpf : '-'}"></td>
                    <td th:text="${item.cargoColaborador != null ? item.cargoColaborador.descricao : '-'}"></td>
                    <td>
                        <span class="badge badge-success" th:if="${usuarioPorColaboradorId[item.id] != null}">SIM</span>
                        <span class="badge badge-secondary" th:if="${usuarioPorColaboradorId[item.id] == null}">NÃO</span>
                        <span class="ml-2 text-muted" th:if="${usuarioPorColaboradorId[item.id] != null}"
                              th:text="${usuarioPorColaboradorId[item.id].usuario.username}">usuário</span>
                    </td>
                    <td th:text="${item.ativo ? 'SIM' : 'NÃO'}"></td>
                    <td class="text-center">
                        <div class="dropdown d-inline-block">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                    type="button"
                                    data-toggle="dropdown"
                                    aria-haspopup="true"
                                    aria-expanded="false">
                                <i class="nav-link-icon lnr-menu"></i>
                            </button>
                            <div class="dropdown-menu dropdown-menu-right">
                                <a class="dropdown-item" th:href="@{'/ui/admin/colaboradores/' + ${item.id} + '/editar'}">
                                    <i class="nav-link-icon lnr-pencil mr-2"></i><span>Editar</span>
                                </a>
                                <form method="post" class="m-0" th:action="@{'/ui/admin/colaboradores/' + ${item.id} + '/excluir'}">
                                    <button type="submit"
                                            class="dropdown-item text-danger"
                                            onclick="return confirm('Excluir colaborador?');">
                                        <i class="nav-link-icon lnr-trash mr-2"></i><span>Excluir</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</html>
