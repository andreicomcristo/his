<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administracao - Escala de Glasgow - Abertura Ocular', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Escala de Glasgow - abertura ocular</h5>
                <a class="btn btn-primary btn-sm" th:href="@{/ui/admin/glasgow-abertura-ocular/novo}">Novo item</a>
            </div>
            <form method="get" class="form-inline mb-3">
                <input type="text" name="q" class="form-control mr-2" placeholder="Buscar por pontuacao ou descricao" th:value="${q}">
                <button class="btn btn-outline-secondary btn-sm" type="submit">Buscar</button>
            </form>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Pontos</th>
                    <th>Descricao</th>
                    <th>Ativo</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.pontos}"></td>
                    <td th:text="${item.descricao}"></td>
                    <td th:text="${item.ativo ? 'SIM' : 'NAO'}"></td>
                    <td class="text-right">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{'/ui/admin/glasgow-abertura-ocular/' + ${item.id} + '/editar'}">Editar</a>
                        <form method="post" class="d-inline" th:action="@{'/ui/admin/glasgow-abertura-ocular/' + ${item.id} + '/excluir'}">
                            <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Excluir item de abertura ocular?');">Excluir</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</html>
