<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout('HIS | Desfechos', ~{::section})}">
    <section>
        <div class="main-card mb-3 card">
            <div class="card-body">
                <style>
                    .filtro-label {
                        font-weight: 700;
                    }
                </style>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title mb-0">Desfechos</h5>
                    <a class="btn btn-primary btn-sm" th:href="@{/ui/desfechos/novo}">Novo desfecho</a>
                </div>
                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form th:action="@{/ui/desfechos}" method="get" class="mb-3">
                    <div class="form-row">
                        <div class="form-group col-md-3">
                            <label for="nome" class="filtro-label">Nome</label>
                            <input id="nome" name="nome" type="text" class="form-control" th:value="${nome}">
                        </div>
                        <div class="form-group col-md-2">
                            <label for="cpf" class="filtro-label">CPF</label>
                            <input id="cpf" name="cpf" type="text" class="form-control" th:value="${cpf}">
                        </div>
                        <div class="form-group col-md-2">
                            <label for="tipoAtendimento" class="filtro-label">Tipo de atendimento</label>
                            <select id="tipoAtendimento" name="tipoAtendimento" class="form-control">
                                <option value="">TODOS</option>
                                <option th:each="item : ${tiposAtendimento}"
                                        th:value="${item.name()}"
                                        th:selected="${tipoAtendimentoSelecionado == item}"
                                        th:text="${item.name()}"></option>
                            </select>
                        </div>
                        <div class="form-group col-md-2">
                            <label for="statusId" class="filtro-label">Status</label>
                            <select id="statusId" name="statusId" class="form-control">
                                <option value="">TODOS</option>
                                <option th:each="item : ${statusAtendimentoOptions}"
                                        th:value="${item.id}"
                                        th:selected="${statusSelecionadoId == item.id}"
                                        th:text="${item.descricao}"></option>
                            </select>
                        </div>
                        <div class="form-group col-md-3">
                            <label for="tipoDesfechoId" class="filtro-label">Tipo de desfecho</label>
                            <select id="tipoDesfechoId" name="tipoDesfechoId" class="form-control">
                                <option value="">TODOS</option>
                                <option th:each="item : ${tiposDesfechoOptions}"
                                        th:value="${item.id}"
                                        th:selected="${tipoDesfechoSelecionadoId == item.id}"
                                        th:text="${item.descricao}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-3">
                            <label for="motivoDesfechoId" class="filtro-label">Motivo do desfecho</label>
                            <select id="motivoDesfechoId" name="motivoDesfechoId" class="form-control">
                                <option value="">TODOS</option>
                                <option th:each="item : ${motivosDesfechoOptions}"
                                        th:value="${item.id}"
                                        th:selected="${motivoDesfechoSelecionadoId == item.id}"
                                        th:text="${item.descricao}"></option>
                            </select>
                        </div>
                        <div class="form-group col-md-3">
                            <label for="dataInicio" class="filtro-label">Data inicio</label>
                            <input id="dataInicio" name="dataInicio" type="date" class="form-control" th:value="${dataInicio}">
                        </div>
                        <div class="form-group col-md-3">
                            <label for="dataFim" class="filtro-label">Data fim</label>
                            <input id="dataFim" name="dataFim" type="date" class="form-control" th:value="${dataFim}">
                        </div>
                        <div class="form-group col-md-1 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary btn-block">Filtrar</button>
                        </div>
                        <div class="form-group col-md-2 d-flex align-items-end">
                            <a th:href="@{/ui/desfechos}" class="btn btn-outline-secondary btn-block">Limpar</a>
                        </div>
                    </div>
                </form>

                <table class="table table-sm table-striped">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Atendimento</th>
                        <th>Paciente</th>
                        <th>Status</th>
                        <th>Tipo</th>
                        <th>Motivo</th>
                        <th>Destino rede</th>
                        <th>Data/Hora</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td colspan="9" class="text-center">Nenhum desfecho encontrado</td>
                    </tr>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.id}"></td>
                        <td th:text="${item.atendimento.id}"></td>
                        <td th:text="${item.atendimento.paciente.nomeExibicao}"></td>
                        <td th:text="${item.atendimento.status != null ? item.atendimento.status.descricao : '-'}"></td>
                        <td th:text="${item.tipoDesfecho.descricao}"></td>
                        <td>
                            <span class="badge"
                                  th:style="${item.motivoDesfecho.cor != null ? 'background:' + item.motivoDesfecho.cor + '; color:#fff;' : 'background:#eef0f3; color:#2f3542;'}"
                                  th:text="${item.motivoDesfecho.descricao}"></span>
                        </td>
                        <td th:text="${item.destinoRede != null ? item.destinoRede.descricao : '-'}"></td>
                        <td th:text="${#temporals.format(item.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-right">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{'/ui/desfechos/' + ${item.id} + '/editar'}">Editar</a>
                            <form method="post" class="d-inline" th:action="@{'/ui/desfechos/' + ${item.id} + '/excluir'}">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Excluir desfecho?');">Excluir</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</th:block>
</body>
</html>
