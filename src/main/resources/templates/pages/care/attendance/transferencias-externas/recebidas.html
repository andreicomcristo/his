<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout('HIS | Transferencias Externas Recebidas', ~{::section})}">
    <section>
        <div class="main-card card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title mb-0">Transferencias externas recebidas</h5>
                    <a th:href="@{/ui/atendimentos}" class="btn btn-outline-secondary btn-sm">Voltar para fila</a>
                </div>

                <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <table class="table table-bordered table-hover table-sm">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Paciente</th>
                        <th>Origem</th>
                        <th>Motivo</th>
                        <th>Status</th>
                        <th>Solicitacao</th>
                        <th>Acoes</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(transferencias)}">
                        <td colspan="7" class="text-center">Nenhuma transferencia pendente</td>
                    </tr>
                    <tr th:each="t : ${transferencias}">
                        <td th:text="${t.id}"></td>
                        <td>
                            <span th:text="${t.episodio.paciente.nomeExibicao}"></span>
                            <small class="text-muted">(#<span th:text="${t.episodio.paciente.id}"></span>)</small>
                        </td>
                        <td th:text="${t.unidadeOrigem.nome}"></td>
                        <td th:text="${t.motivo}"></td>
                        <td th:text="${t.status.nome}"></td>
                        <td th:text="${#temporals.format(t.dataSolicitacao, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <form th:action="@{/ui/transferencias-externas/{id}/acolher(id=${t.id})}" method="post" class="d-inline">
                                <button class="btn btn-sm btn-success" type="submit">Acolher e abrir entrada</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</th:block>
</body>
</html>
