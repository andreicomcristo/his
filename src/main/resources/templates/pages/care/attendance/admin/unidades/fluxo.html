<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administracao - Fluxo da Unidade', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title mb-2">Fluxo Assistencial da Unidade</h5>
            <p class="text-muted mb-3">
                Unidade: <strong th:text="${unidade.nome}">UNIDADE</strong>
                <span th:text="${unidade.cnes != null ? ' | CNES ' + unidade.cnes : ''}"></span>
            </p>

            <form th:action="@{'/ui/admin/unidades/' + ${unidade.id} + '/fluxo'}"
                  method="post"
                  th:object="${form}">

                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                    <div th:each="e : ${#fields.globalErrors()}" th:text="${e}"></div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Primeiro passo da unidade</label>
                        <select class="form-control" th:field="*{primeiroPasso}">
                            <option th:each="p : ${primeirosPassos}" th:value="${p}" th:text="${p}"></option>
                        </select>
                        <small class="text-muted">
                            Define quem pode criar atendimento: TRIAGEM (classificacao) ou RECEPCAO.
                        </small>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-4">
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input" th:field="*{exigeFichaParaMedico}">
                            <label class="form-check-label">Exige ficha para medico</label>
                        </div>
                    </div>
                    <div class="form-group col-md-4">
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input" th:field="*{permiteAgendamento}">
                            <label class="form-check-label">Permite agendamento na unidade</label>
                        </div>
                    </div>
                </div>

                <hr>
                <h6>Triagem obrigatoria por tipo de atendimento</h6>
                <p class="text-muted mb-2">
                    Se marcado, nao libera Entrada/Episodio ate finalizar triagem desse tipo.
                </p>

                <div class="form-row">
                    <div class="form-group col-md-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{triagemObrigatoriaUrgencia}">
                            <label class="form-check-label">URGENCIA</label>
                        </div>
                    </div>
                    <div class="form-group col-md-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{triagemObrigatoriaAmbulatorial}">
                            <label class="form-check-label">AMBULATORIAL</label>
                        </div>
                    </div>
                    <div class="form-group col-md-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{triagemObrigatoriaInternacaoDireta}">
                            <label class="form-check-label">INTERNACAO_DIRETA</label>
                        </div>
                    </div>
                    <div class="form-group col-md-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{triagemObrigatoriaProcedimento}">
                            <label class="form-check-label">PROCEDIMENTO</label>
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary btn-sm" type="submit">Salvar configuracao</button>
                <a th:href="@{/ui/admin/unidades}" class="btn btn-outline-secondary btn-sm">Voltar</a>
            </form>
        </div>
    </div>
</th:block>
</html>
