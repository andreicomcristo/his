<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administracao - Editar Tipo de Destino Assistencial' : 'Administracao - Novo Tipo de Destino Assistencial', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title"
                th:text="${modoEdicao} ? 'Editar tipo de destino assistencial' : 'Novo tipo de destino assistencial'">
            </h5>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form method="post"
                  th:object="${form}"
                  th:action="${modoEdicao} ? @{'/ui/admin/tipos-destino-assistencial/' + ${itemId}} : @{/ui/admin/tipos-destino-assistencial}">
                <div class="form-row">
                    <div class="form-group col-md-3">
                        <label>Codigo<span class="required-mark">*</span></label>
                        <input type="text"
                               class="form-control"
                               th:field="*{codigo}"
                               placeholder="Ex.: CONSULTORIO">
                        <small class="text-danger" th:errors="*{codigo}"></small>
                    </div>
                    <div class="form-group col-md-7">
                        <label>Descricao<span class="required-mark">*</span></label>
                        <input type="text"
                               class="form-control"
                               th:field="*{descricao}"
                               placeholder="Descricao do tipo de destino">
                        <small class="text-danger" th:errors="*{descricao}"></small>
                    </div>
                    <div class="form-group col-md-2">
                        <label>Ordem<span class="required-mark">*</span></label>
                        <input type="number"
                               min="0"
                               max="9999"
                               class="form-control"
                               th:field="*{ordemExibicao}">
                        <small class="text-danger" th:errors="*{ordemExibicao}"></small>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-12">
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input" th:field="*{ativo}">
                            <label class="form-check-label">Ativo</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-sm mr-2">Salvar</button>
                <a th:href="@{/ui/admin/tipos-destino-assistencial}" class="btn btn-secondary btn-sm">Voltar</a>
            </form>
        </div>
    </div>
</th:block>
</html>
