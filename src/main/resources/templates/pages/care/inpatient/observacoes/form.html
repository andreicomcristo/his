<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Editar Observacao' : 'Nova Observacao', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title" th:text="${modoEdicao} ? 'Editar observacao' : 'Nova observacao'">Observacao</h5>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <form method="post"
                  th:object="${form}"
                  th:action="${modoEdicao} ? @{'/ui/observacoes/' + ${itemId}} : @{/ui/observacoes}">
                <input th:if="${!modoEdicao and atendimentoTravado}" type="hidden" name="atendimentoTravado" value="true">
                <div class="form-row">
                    <div class="form-group col-md-12">
                        <label>Atendimento<span class="required-mark">*</span></label>
                        <th:block th:if="${!modoEdicao and atendimentoTravado and atendimentoSelecionado != null}">
                            <input type="hidden" th:field="*{atendimentoId}">
                            <input type="text"
                                   class="form-control"
                                   readonly
                                   th:value="${'#' + atendimentoSelecionado.id + ' - ' + atendimentoSelecionado.paciente.nomeExibicao + ' - ' + atendimentoSelecionado.unidade.nome}">
                        </th:block>
                        <select th:if="${modoEdicao or !atendimentoTravado or atendimentoSelecionado == null}"
                                class="form-control"
                                th:field="*{atendimentoId}">
                            <option value="">Selecione</option>
                            <option th:each="item : ${atendimentos}"
                                    th:value="${item.id}"
                                    th:text="${'#' + item.id + ' - ' + item.paciente.nomeExibicao + ' - ' + item.unidade.nome}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{atendimentoId}"></small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Data/Hora inicio<span class="required-mark">*</span></label>
                        <input type="datetime-local" class="form-control" th:field="*{dataHoraInicio}">
                        <small class="text-danger" th:errors="*{dataHoraInicio}"></small>
                    </div>
                    <div class="form-group col-md-8">
                        <label>Leito</label>
                        <select class="form-control" th:field="*{leitoId}">
                            <option value="">Sem leito</option>
                            <option th:each="item : ${leitosDisponiveis}"
                                    th:value="${item.id}"
                                    th:text="${item.area.descricao + ' - ' + item.codigo + (item.descricao != null ? ' - ' + item.descricao : '')}"></option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12">
                        <label>Observacao</label>
                        <textarea class="form-control" rows="3" th:field="*{observacao}"></textarea>
                        <small class="text-danger" th:errors="*{observacao}"></small>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Salvar</button>
                <a th:href="@{/ui/observacoes}" class="btn btn-secondary btn-sm">Voltar</a>
            </form>
        </div>
    </div>
</th:block>
</html>
