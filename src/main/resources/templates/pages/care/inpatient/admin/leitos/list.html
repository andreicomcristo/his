<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administração - Leitos', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Leitos</h5>
                <div class="btn-group btn-group-sm" role="group">
                    <a class="btn btn-primary"
                       th:href="@{/ui/admin/leitos/novo}"
                       data-toggle="tooltip"
                       data-placement="top"
                       title="Adicionar um novo leito">
                        <i class="nav-link-icon lnr-plus-circle mr-2"></i>Adicionar
                    </a>
                </div>
            </div>

            <form method="get" class="mb-3">
                <div class="form-row">
                    <div class="form-group col-md-12">
                        <label class="filtro-label">Pesquisa</label>
                        <input type="text" name="q" class="form-control"
                               placeholder="Buscar por código, descrição, área ou unidade"
                               th:value="${q}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 d-flex">
                        <button class="btn btn-sm btn-primary mr-2" type="submit">
                            <i class="nav-link-icon lnr-magnifier mr-2"></i>Buscar
                        </button>
                        <a th:href="@{/ui/admin/leitos}" class="btn btn-sm btn-secondary">
                            <i class="nav-link-icon lnr-cross mr-2"></i>Limpar
                        </a>
                    </div>
                </div>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Unidade</th>
                    <th>Área</th>
                    <th>Código</th>
                    <th>Tipo</th>
                    <th>Perfil</th>
                    <th>Natureza</th>
                    <th>Modalidades</th>
                    <th>Recebe PS</th>
                    <th>Destino definitivo</th>
                    <th>Assistencial</th>
                    <th>Ativo</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.unidade.nome}"></td>
                    <td th:text="${item.area.nome}"></td>
                    <td th:text="${item.codigo}"></td>
                    <td th:text="${item.tipoLeito.descricao}"></td>
                    <td th:text="${item.perfilLeito != null ? item.perfilLeito.descricao : '-'}"></td>
                    <td th:text="${item.naturezaOperacional != null ? item.naturezaOperacional.descricao : '-'}"></td>
                    <td th:text="${mapaModalidades[item.id]}"></td>
                    <td th:text="${item.recebePs ? 'SIM' : 'NÃO'}"></td>
                    <td th:text="${item.permiteDestinoDefinitivo ? 'SIM' : 'NÃO'}"></td>
                    <td th:text="${item.assistencial ? 'SIM' : 'NÃO'}"></td>
                    <td th:text="${item.ativo ? 'SIM' : 'NÃO'}"></td>
                    <td class="text-right">
                        <div class="dropdown d-inline-block">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                    type="button"
                                    data-toggle="dropdown"
                                    aria-haspopup="true"
                                    aria-expanded="false">
                                <i class="nav-link-icon lnr-menu"></i>
                            </button>
                            <div class="dropdown-menu dropdown-menu-right">
                                <a class="dropdown-item" th:href="@{'/ui/admin/leitos/' + ${item.id} + '/editar'}">
                                    <i class="nav-link-icon lnr-pencil mr-2"></i><span>Editar</span>
                                </a>
                                <form method="post" class="m-0" th:action="@{'/ui/admin/leitos/' + ${item.id} + '/excluir'}">
                                    <button type="submit"
                                            class="dropdown-item text-danger"
                                            onclick="return confirm('Excluir leito?');">
                                        <i class="nav-link-icon lnr-trash mr-2"></i><span>Excluir</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</html>
