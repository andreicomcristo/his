<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administração - Áreas', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title">Áreas</h5>
                <div class="btn-group btn-group-sm" role="group">
                    <a class="btn btn-outline-info"
                       th:href="@{/ui/admin/areas/cancelados}"
                       data-toggle="tooltip"
                       data-placement="top"
                       title="Visualizar áreas canceladas">
                        <i class="nav-link-icon lnr-book mr-2"></i>Cancelados</a>
                    <a class="btn btn-primary"
                       th:href="@{/ui/admin/areas/novo}"
                       data-toggle="tooltip"
                       data-placement="top"
                       title="Adicionar uma nova área">
                        <i class="nav-link-icon lnr-plus-circle mr-2"></i>Adicionar</a>
                </div>
            </div>

            <form method="get">
                <div class="form-row">
                    <div class="form-group col-md-12">
                        <label class="filtro-label">Pesquisa</label>
                        <input type="text"
                               name="q"
                               class="form-control"
                               placeholder="Buscar por descrição, detalhamento ou unidade"
                               th:value="${q}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 d-flex">
                        <button class="btn btn-sm btn-primary mr-2" type="submit">
                            <i class="nav-link-icon lnr-magnifier mr-2"></i>Buscar
                        </button>
                        <a th:href="@{/ui/admin/areas}" class="btn btn-sm btn-secondary">
                            <i class="nav-link-icon lnr-cross mr-2"></i>Limpar
                        </a>
                    </div>
                </div>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Unidade</th>
                    <th>Tipo</th>
                    <th>Descrição</th>
                    <th>Detalhamento</th>
                    <th class="text-center">Opções</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:inline="text">
                    <!--[[${item.unidade.nome}]] - -->[[${item.unidade.sigla}]]
                    </td>
                    <td th:text="${item.tipoArea != null ? item.tipoArea.descricao : '-'}"></td>
                    <td th:text="${item.descricao}"></td>
                    <td th:text="${item.detalhamento != null ? item.detalhamento : '-'}"></td>
                    <td class="text-center">
                        <div class="dropdown d-inline-block">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                    type="button"
                                    data-toggle="dropdown"
                                    aria-haspopup="true"
                                    aria-expanded="false">
                                <i class="nav-link-icon lnr-menu"></i>
                            </button>
                            <div class="dropdown-menu dropdown-menu-right">
                                <a class="dropdown-item"
                                   th:href="@{'/ui/admin/areas/' + ${item.id} + '/capacidades'}">
                                    <i class="nav-link-icon lnr-link mr-2"></i><span>Capacidades</span>
                                </a>
                                <a class="dropdown-item text-warning"
                                   th:href="@{'/ui/admin/areas/' + ${item.id} + '/editar'}">
                                    <i class="nav-link-icon lnr-pencil mr-2"></i><span>Editar</span>
                                </a>
                                <button type="button"
                                        class="dropdown-item text-danger js-area-action"
                                        data-action="excluir"
                                        th:data-action-url="@{'/ui/admin/areas/' + ${item.id} + '/excluir'}"
                                        th:data-item-descricao="${item.descricao}">
                                    <i class="nav-link-icon lnr-trash mr-2"></i><span>Excluir</span>
                                </button>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <form id="areaActionForm" method="post" class="d-none">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>

    <div class="modal fade" id="areaActionModal" tabindex="-1" role="dialog" aria-labelledby="areaActionModalTitle"
         aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="areaActionModalTitle">Confirmar acao</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Fechar">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p class="mb-0" id="areaActionModalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="nav-link-icon lnr-cross mr-2"></i>Cancelar
                    </button>
                    <button type="button" class="btn btn-primary" id="areaActionModalConfirmBtn">
                        <i class="nav-link-icon lnr-checkmark mr-2"></i>Confirmar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var actionButtons = document.querySelectorAll('.js-area-action');
            var actionForm = document.getElementById('areaActionForm');
            var modalEl = document.getElementById('areaActionModal');
            var modalTitleEl = document.getElementById('areaActionModalTitle');
            var modalMessageEl = document.getElementById('areaActionModalMessage');
            var confirmBtn = document.getElementById('areaActionModalConfirmBtn');
            var pendingActionUrl = null;
            var pendingDescricao = '';

            function clearButtonStyle() {
                confirmBtn.classList.remove('btn-danger', 'btn-warning', 'btn-success', 'btn-primary');
            }

            actionButtons.forEach(function (button) {
                button.addEventListener('click', function () {
                    pendingActionUrl = this.getAttribute('data-action-url');
                    pendingDescricao = this.getAttribute('data-item-descricao') || '';
                    modalTitleEl.textContent = 'Excluir area';
                    modalMessageEl.textContent = 'Deseja excluir a area "' + pendingDescricao
                        + '"? Ela recebera dt_cancelamento e nao sera mais listada.';
                    confirmBtn.innerHTML = '<i class="nav-link-icon lnr-trash mr-2"></i>Excluir';
                    clearButtonStyle();
                    confirmBtn.classList.add('btn-danger');

                    if (window.jQuery) {
                        var dropdown = window.jQuery(this).closest('.dropdown');
                        if (dropdown.length && dropdown.hasClass('show')) {
                            dropdown.find('[data-toggle="dropdown"]').dropdown('toggle');
                        }
                        window.jQuery(modalEl).modal('show');
                    }
                });
            });

            confirmBtn.addEventListener('click', function () {
                if (!pendingActionUrl) {
                    return;
                }
                actionForm.setAttribute('action', pendingActionUrl);
                actionForm.submit();
            });
        });
    </script>
</th:block>
</html>
