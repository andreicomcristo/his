<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administracao - Editar Area' : 'Administracao - Nova Area', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title" th:text="${modoEdicao} ? 'Editar Area' : 'Nova Area'"></h5>
            <form th:object="${form}" method="post"
                  th:action="${modoEdicao} ? @{'/ui/admin/areas/' + ${itemId}} : @{/ui/admin/areas}">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Unidade<span class="required-mark">*</span></label>
                        <select class="form-control" th:field="*{unidadeId}">
                            <option value="">Selecione</option>
                            <option th:each="unidade : ${unidades}" th:value="${unidade.id}" th:text="${unidade.nome}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{unidadeId}"></small>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Nome<span class="required-mark">*</span></label>
                        <input type="text" class="form-control" th:field="*{nome}">
                        <small class="text-danger" th:errors="*{nome}"></small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-10">
                        <label>Descricao</label>
                        <textarea class="form-control" rows="3" th:field="*{descricao}"></textarea>
                        <small class="text-danger" th:errors="*{descricao}"></small>
                    </div>
                    <div class="form-group col-md-2 d-flex align-items-center">
                        <div class="form-check mt-4">
                            <input type="checkbox" class="form-check-input" th:field="*{ativo}">
                            <label class="form-check-label" for="ativo">Ativa</label>
                        </div>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary mr-2">Salvar</button>
                    <a class="btn btn-secondary" th:href="@{/ui/admin/areas}">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</th:block>
</html>
