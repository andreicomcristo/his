<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administracao - Editar Area' : 'Administracao - Nova Area', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title" th:text="${modoEdicao} ? 'Editar Area' : 'Nova Area'"></h5>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form th:object="${form}" method="post"
                  th:action="${modoEdicao} ? @{'/ui/admin/areas/' + ${itemId}} : @{/ui/admin/areas}">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Unidade<span class="required-mark">*</span></label>
                        <select class="multiselect-dropdown form-control" th:field="*{unidadeId}">
                            <option value="">Selecione</option>
                            <option th:each="unidade : ${unidades}" th:value="${unidade.id}" th:text="${unidade.nome}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{unidadeId}"></small>
                    </div>
                    <div class="form-group col-md-8">
                        <label>Descricao<span class="required-mark">*</span></label>
                        <input type="text"
                               class="form-control"
                               th:field="*{descricao}"
                               placeholder="Informe a descricao da area">
                        <small class="text-danger" th:errors="*{descricao}"></small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12">
                        <label>Detalhamento</label>
                        <textarea class="form-control"
                                  rows="3"
                                  th:field="*{detalhamento}"
                                  placeholder="Informe o detalhamento da area"></textarea>
                        <small class="text-danger" th:errors="*{detalhamento}"></small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 mb-0">
                        <div class="d-flex">
                            <button type="submit" class="btn btn-primary btn-sm mr-2">
                                <i class="nav-link-icon lnr-checkmark-circle mr-2"></i>Salvar
                            </button>
                            <a class="btn btn-secondary btn-sm" th:href="@{/ui/admin/areas}">
                                <i class="nav-link-icon lnr-exit mr-2"></i>Voltar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</th:block>
</html>
