<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administração - Editar Capacidade' : 'Administração - Nova Capacidade', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title" th:text="${modoEdicao} ? 'Editar capacidade de área' : 'Nova capacidade de área'"></h5>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <form th:object="${form}" method="post"
                  th:action="${modoEdicao} ? @{'/ui/admin/capacidades-area/' + ${itemId}} : @{/ui/admin/capacidades-area}">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Nome<span class="required-mark">*</span></label>
                        <input type="text"
                               class="form-control"
                               th:field="*{nome}"
                               placeholder="Informe o nome da capacidade">
                        <small class="text-danger" th:errors="*{nome}"></small>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Descrição</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{descricao}"
                               placeholder="Informe a descrição da capacidade">
                        <small class="text-danger" th:errors="*{descricao}"></small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-2">
                        <div class="form-check mt-4">
                            <input type="checkbox" class="form-check-input" th:field="*{ativo}">
                            <label class="form-check-label" for="ativo">Ativa</label>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-12 mb-0">
                        <div class="d-flex">
                            <button type="submit" class="btn btn-primary btn-sm mr-2">
                                <i class="nav-link-icon lnr-checkmark-circle mr-2"></i>Salvar
                            </button>
                            <a class="btn btn-secondary btn-sm" th:href="@{/ui/admin/capacidades-area}">
                                <i class="nav-link-icon lnr-exit mr-2"></i>Voltar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</th:block>
</html>
