<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administracao - Editar Capacidade' : 'Administracao - Nova Capacidade', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title" th:text="${modoEdicao} ? 'Editar capacidade da area' : 'Nova capacidade da area'"></h5>
            <form th:object="${form}" method="post"
                  th:action="${modoEdicao} ? @{'/ui/admin/capacidades-area/' + ${itemId}} : @{/ui/admin/capacidades-area}">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Nome<span class="required-mark">*</span></label>
                        <input type="text" class="form-control" th:field="*{nome}">
                        <small class="text-danger" th:errors="*{nome}"></small>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Descricao</label>
                        <input type="text" class="form-control" th:field="*{descricao}">
                        <small class="text-danger" th:errors="*{descricao}"></small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-2">
                        <div class="form-check mt-4">
                            <input type="checkbox" class="form-check-input" th:field="*{ativo}">
                            <label class="form-check-label" for="ativo">Ativa</label>
                        </div>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary mr-2">Salvar</button>
                    <a class="btn btn-secondary" th:href="@{/ui/admin/capacidades-area}">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</th:block>
</html>
