<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administração - Áreas Canceladas', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title">Áreas canceladas</h5>
                <div class="btn-group btn-group-sm" role="group">
                    <a class="btn btn-secondary"
                       th:href="@{/ui/admin/areas}"
                       data-toggle="tooltip"
                       data-placement="top"
                       title="Voltar para áreas">
                        <i class="nav-link-icon lnr-arrow-left mr-2"></i>Voltar</a>
                </div>
            </div>

            <form method="get" th:action="@{/ui/admin/areas/cancelados}">
                <div class="form-row">
                    <div class="form-group col-md-12">
                        <label class="filtro-label">Pesquisa</label>
                        <input type="text"
                               name="q"
                               class="form-control"
                               placeholder="Buscar por descrição, detalhamento ou unidade"
                               th:value="${q}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 d-flex">
                        <button class="btn btn-sm btn-primary mr-2" type="submit">
                            <i class="nav-link-icon lnr-magnifier mr-2"></i>Buscar
                        </button>
                        <a th:href="@{/ui/admin/areas/cancelados}" class="btn btn-sm btn-secondary">
                            <i class="nav-link-icon lnr-cross mr-2"></i>Limpar
                        </a>
                    </div>
                </div>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Unidade</th>
                    <th>Tipo</th>
                    <th>Descrição</th>
                    <th>Detalhamento</th>
                    <th>Data cancelamento</th>
                    <th class="text-center">Opções</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(items)}">
                    <td colspan="7" class="text-center">Nenhuma área cancelada encontrada</td>
                </tr>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.unidade.nome}"></td>
                    <td th:text="${item.tipoArea != null ? item.tipoArea.descricao : '-'}"></td>
                    <td th:text="${item.descricao}"></td>
                    <td th:text="${item.detalhamento != null ? item.detalhamento : '-'}"></td>
                    <td th:text="${item.dtCancelamento != null ? #temporals.format(item.dtCancelamento, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                    <td class="text-center">
                        <div class="dropdown d-inline-block">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                    type="button"
                                    data-toggle="dropdown"
                                    aria-haspopup="true"
                                    aria-expanded="false">
                                <i class="nav-link-icon lnr-menu"></i>
                            </button>
                            <div class="dropdown-menu dropdown-menu-right">
                                <button type="button"
                                        class="dropdown-item text-info js-area-action"
                                        data-action="restaurar"
                                        th:data-action-url="@{'/ui/admin/areas/' + ${item.id} + '/restaurar'}"
                                        th:data-item-descricao="${item.descricao}">
                                    <i class="nav-link-icon pe-7s-refresh-2 mr-2"></i><span>Restaurar</span>
                                </button>
                                <hr>
                                <button type="button"
                                        class="dropdown-item text-danger js-area-action"
                                        data-action="excluir-permanente"
                                        th:data-action-url="@{'/ui/admin/areas/' + ${item.id} + '/excluir-permanente'}"
                                        th:data-item-descricao="${item.descricao}">
                                    <i class="nav-link-icon lnr-trash mr-2"></i><span>Excluir permanente</span>
                                </button>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <form id="areaActionForm" method="post" class="d-none">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>

    <div class="modal fade" id="areaActionModal" tabindex="-1" role="dialog" aria-labelledby="areaActionModalTitle"
         aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="areaActionModalTitle">Confirmar acao</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Fechar">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p class="mb-0" id="areaActionModalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="nav-link-icon lnr-cross mr-2"></i>Cancelar
                    </button>
                    <button type="button" class="btn btn-primary" id="areaActionModalConfirmBtn">
                        <i class="nav-link-icon lnr-checkmark mr-2"></i>Confirmar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var actionButtons = document.querySelectorAll('.js-area-action');
            var actionForm = document.getElementById('areaActionForm');
            var modalEl = document.getElementById('areaActionModal');
            var modalTitleEl = document.getElementById('areaActionModalTitle');
            var modalMessageEl = document.getElementById('areaActionModalMessage');
            var confirmBtn = document.getElementById('areaActionModalConfirmBtn');
            var pendingActionUrl = null;

            function configByAction(action, itemDescricao) {
                if (action === 'excluir-permanente') {
                    return {
                        title: 'Excluir area permanentemente',
                        message: 'Deseja excluir permanentemente a area "' + itemDescricao + '"? Esta acao e irreversivel.',
                        buttonHtml: '<i class="nav-link-icon lnr-trash mr-2"></i>Excluir permanente',
                        buttonClass: 'btn-danger'
                    };
                }
                return {
                    title: 'Restaurar area',
                    message: 'Deseja restaurar a area "' + itemDescricao + '"?',
                    buttonHtml: '<i class="nav-link-icon pe-7s-refresh-2 mr-2"></i>Restaurar',
                    buttonClass: 'btn-info'
                };
            }

            function clearButtonStyle() {
                confirmBtn.classList.remove('btn-danger', 'btn-warning', 'btn-success', 'btn-primary');
            }

            actionButtons.forEach(function (button) {
                button.addEventListener('click', function () {
                    pendingActionUrl = this.getAttribute('data-action-url');
                    var pendingDescricao = this.getAttribute('data-item-descricao') || '';
                    var action = this.getAttribute('data-action') || 'restaurar';
                    var config = configByAction(action, pendingDescricao);

                    modalTitleEl.textContent = config.title;
                    modalMessageEl.textContent = config.message;
                    confirmBtn.innerHTML = config.buttonHtml;
                    clearButtonStyle();
                    confirmBtn.classList.add(config.buttonClass);

                    if (window.jQuery) {
                        var dropdown = window.jQuery(this).closest('.dropdown');
                        if (dropdown.length && dropdown.hasClass('show')) {
                            dropdown.find('[data-toggle="dropdown"]').dropdown('toggle');
                        }
                        window.jQuery(modalEl).modal('show');
                    }
                });
            });

            confirmBtn.addEventListener('click', function () {
                if (!pendingActionUrl) {
                    return;
                }
                actionForm.setAttribute('action', pendingActionUrl);
                actionForm.submit();
            });
        });
    </script>
</th:block>
</html>
