<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Agendamento - Lista de agendas', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Agenda por cargo/especialidade</h5>
                <div class="btn-group btn-group-sm" role="group">
                    <a class="btn btn-outline-info"
                       th:if="${agendamentoHabilitado}"
                       th:href="@{/ui/agendamentos/calendario}"><i class="nav-link-icon lnr-calendar-full mr-2"></i>Calendário</a>
                    <a class="btn btn-primary"
                       th:if="${agendamentoHabilitado}"
                       th:href="@{/ui/agendamentos/novo}"><i class="nav-link-icon lnr-plus-circle mr-2"></i>Agenda</a>
                </div>
            </div>

            <div class="alert alert-warning"
                 th:if="${!agendamentoHabilitado}">
                Agendamento nao habilitado para esta unidade. Configure em Administração > Fluxo por unidade.
            </div>
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form method="get" class="mb-3">
                <div class="form-row">
                    <div class="form-group col-md-3">
                        <label class="filtro-label">Cargo assistencial</label>
                        <select name="cargoColaboradorId"
                                id="cargoColaboradorFiltroId"
                                class="form-control"
                                th:attr="data-especialidades-url-base=@{/ui/agendamentos/especialidades-por-cargo/}">
                            <option value="">TODOS</option>
                            <option th:each="cargo : ${cargos}"
                                    th:value="${cargo.id}"
                                    th:selected="${cargoColaboradorSelecionadoId == cargo.id}"
                                    th:text="${cargo.descricao}"></option>
                        </select>
                    </div>
                    <div class="form-group col-md-3">
                        <label class="filtro-label">Especialidade</label>
                        <select name="especialidadeId" id="especialidadeFiltroId" class="form-control">
                            <option value="">TODAS</option>
                            <option th:each="esp : ${especialidades}"
                                    th:value="${esp.id}"
                                    th:selected="${especialidadeSelecionadaId == esp.id}"
                                    th:text="${esp.descricao}"></option>
                        </select>
                    </div>
                    <div class="form-group col-md-3">
                        <label class="filtro-label">Data inicial</label>
                        <input type="date" name="dataInicio" class="form-control" th:value="${dataInicio}">
                    </div>
                    <div class="form-group col-md-3">
                        <label class="filtro-label">Data final</label>
                        <input type="date" name="dataFim" class="form-control" th:value="${dataFim}">
                    </div>
                    <div class="form-group col-md-2 d-flex align-items-end">
                        <button class="btn btn-primary mr-2" type="submit"><i class="nav-link-icon lnr-magnifier mr-2"></i>Filtrar</button>                
                        <a th:href="@{/ui/agendamentos}" class="btn btn-secondary btn-block mr-2"><i class="nav-link-icon lnr-cross mr-2"></i>Limpar</a>
                    </div>
                </div>
            </form>

            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>Data</th>
                    <th>Cargo</th>
                    <th>Especialidade</th>
                    <th>Horário</th>
                    <th>Vagas</th>
                    <th>Disponíveis</th>
                    <th>Ativo</th>
                    <th>Observações</th>
                    <th>Pacientes</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(items)}">
                    <td colspan="10" class="text-center">Nenhuma agenda encontrada</td>
                </tr>
                <tr th:each="item : ${items}">
                    <td th:text="${#temporals.format(item.dataAgenda, 'dd/MM/yyyy')}"></td>
                    <td th:text="${item.cargoColaborador.descricao}"></td>
                    <td th:text="${item.especialidade != null ? item.especialidade.descricao : '-'}"></td>
                    <td th:text="${#temporals.format(item.horaInicio, 'HH:mm') + ' - ' + #temporals.format(item.horaFim, 'HH:mm')}"></td>
                    <td th:text="${item.vagasTotais + ' (retorno: ' + item.vagasRetorno + ')'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${vagasDisponiveisPorAgenda[item.id] > 0} ? 'badge-success' : 'badge-danger'"
                              th:text="${vagasDisponiveisPorAgenda[item.id]}">0</span>
                    </td>
                    <td th:text="${item.ativo ? 'SIM' : 'NAO'}"></td>
                    <td th:text="${item.observacao != null ? item.observacao : '-'}"></td>
                    <td>
                        <a class="btn btn-sm btn-outline-info"
                           th:if="${agendamentoHabilitado}"
                           th:href="@{'/ui/agendamentos/' + ${item.id} + '/pacientes'}"><i class="nav-link-icon lnr-link mr-2"></i>Vincular</a>
                    </td>
                    <td class="text-right">
                        <div class="dropdown d-inline-block" th:if="${agendamentoHabilitado}">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                    type="button"
                                    data-toggle="dropdown"
                                    aria-haspopup="true"
                                    aria-expanded="false">
                                <i class="nav-link-icon lnr-menu"></i>
                            </button>
                            <div class="dropdown-menu dropdown-menu-right">
                                <a class="dropdown-item"
                                   th:href="@{'/ui/agendamentos/' + ${item.id} + '/editar'}">
                                    <i class="nav-link-icon lnr-pencil mr-2"></i><span>Editar</span>
                                </a>
                                <form method="post"
                                      class="m-0"
                                      th:action="@{'/ui/agendamentos/' + ${item.id} + '/excluir'}">
                                    <button type="submit"
                                            class="dropdown-item text-danger"
                                            onclick="return confirm('Excluir agenda?');">
                                        <i class="nav-link-icon lnr-trash mr-2"></i><span>Excluir</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        (function () {
            var cargoSelect = document.getElementById('cargoColaboradorFiltroId');
            var especialidadeSelect = document.getElementById('especialidadeFiltroId');
            if (!cargoSelect || !especialidadeSelect) {
                return;
            }

            var urlBase = cargoSelect.getAttribute('data-especialidades-url-base') || '/ui/agendamentos/especialidades-por-cargo/';
            var especialidadeSelecionadaInicial = especialidadeSelect.value;
            var opcoesTodasEspecialidades = Array.from(especialidadeSelect.options).map(function (option) {
                return { value: option.value, text: option.text };
            });

            function preencherEspecialidades(opcoes, selectedId) {
                especialidadeSelect.innerHTML = '';
                opcoes.forEach(function (opcao) {
                    var option = document.createElement('option');
                    option.value = opcao.value;
                    option.textContent = opcao.text;
                    if (selectedId && String(selectedId) === String(opcao.value)) {
                        option.selected = true;
                    }
                    especialidadeSelect.appendChild(option);
                });
            }

            function carregarEspecialidades(cargoId, selectedId) {
                if (!cargoId) {
                    preencherEspecialidades(opcoesTodasEspecialidades, selectedId);
                    return;
                }
                fetch(urlBase + cargoId)
                    .then(function (response) { return response.json(); })
                    .then(function (items) {
                        var opcoes = [{ value: '', text: 'TODAS' }];
                        items.forEach(function (item) {
                            opcoes.push({ value: String(item.id), text: item.descricao });
                        });
                        preencherEspecialidades(opcoes, selectedId);
                    })
                    .catch(function () {
                        preencherEspecialidades([{ value: '', text: 'TODAS' }], null);
                    });
            }

            cargoSelect.addEventListener('change', function () {
                carregarEspecialidades(this.value, null);
            });

            carregarEspecialidades(cargoSelect.value, especialidadeSelecionadaInicial);
        }());
    </script>
</th:block>
</html>
