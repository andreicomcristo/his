<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Agendamento - Pacientes', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title mb-2">Pacientes agendados</h5>
            <p class="text-muted mb-3">
                <strong th:text="${agenda.cargoColaborador.descricao}">CARGO</strong>
                <span th:text="${' | ' + (agenda.especialidade != null ? agenda.especialidade.descricao : 'NAO SE APLICA')}"></span>
                <span th:text="${' | ' + #temporals.format(agenda.dataAgenda, 'dd/MM/yyyy') + ' ' + #temporals.format(agenda.horaInicio, 'HH:mm')}"></span>
            </p>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="row agenda-metricas mb-3">
                <div class="col-12 col-sm-6 col-lg mb-2">
                    <span class="badge badge-primary d-block py-2"
                          th:text="${'Vagas totais: ' + agenda.vagasTotais}"></span>
                </div>
                <div class="col-12 col-sm-6 col-lg mb-2">
                    <span class="badge badge-danger d-block py-2"
                          th:text="${'Ocupadas: ' + vagasOcupadas}"></span>
                </div>
                <div class="col-12 col-sm-6 col-lg mb-2">
                    <span class="badge badge-success d-block py-2"
                          th:text="${'Disponiveis: ' + vagasDisponiveis}"></span>
                </div>
            </div>

            <div class="alert alert-warning py-2" th:if="${vagasDisponiveis <= 0}">
                Esta sessao nao possui mais vagas disponiveis para novos agendamentos.
            </div>
            <div class="alert alert-warning py-2"
                 th:if="${agenda.modoAgenda.name() == 'HORARIO_SESSAO' and #lists.isEmpty(horariosDisponiveis)}">
                Esta agenda por horario nao possui horarios livres para novos agendamentos.
            </div>

            <form method="post"
                  th:object="${pacienteForm}"
                  th:action="@{'/ui/agendamentos/' + ${agenda.id} + '/pacientes'}"
                  class="mb-4 agenda-paciente-form">
                <div class="form-row">
                    <div class="form-group col-12 col-lg-4">
                        <label>Paciente<span class="required-mark">*</span></label>
                        <select class="multiselect-dropdown form-control" th:field="*{pacienteId}">
                            <option value="">Selecione</option>
                            <option th:each="p : ${pacientesDisponiveis}"
                                    th:value="${p.id}"
                                    th:text="${p.nomeExibicao + (p.cpf != null ? ' | CPF: ' + p.cpf : '')}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{pacienteId}"></small>
                    </div>
                    <div class="form-group col-12 col-md-6 col-lg-2">
                        <label>Tipo da vaga<span class="required-mark">*</span></label>
                        <select class="multiselect-dropdown form-control" th:field="*{tipoVaga}">
                            <option th:each="t : ${tiposVaga}" th:value="${t}" th:text="${t}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{tipoVaga}"></small>
                    </div>
                    <div class="form-group col-12 col-md-6 col-lg-2"
                         th:if="${agenda.modoAgenda.name() == 'HORARIO_SESSAO'}">
                        <label>Horario<span class="required-mark">*</span></label>
                        <select class="multiselect-dropdown form-control" th:field="*{horaAtendimento}">
                            <option value="">Selecione</option>
                            <option th:each="h : ${horariosDisponiveis}"
                                    th:value="${#temporals.format(h, 'HH:mm')}"
                                    th:text="${#temporals.format(h, 'HH:mm')}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{horaAtendimento}"></small>
                    </div>
                    <div class="form-group col-12 col-md-6 col-lg-2">
                        <label>Recorrencia</label>
                        <select class="multiselect-dropdown form-control" th:field="*{periodicidadeRecorrencia}" id="periodicidadeRecorrencia">
                            <option th:each="p : ${periodicidadesRecorrencia}"
                                    th:value="${p}"
                                    th:text="${p.name() == 'SEMANAL' ? 'Semanal' : 'Nao recorrente'}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{periodicidadeRecorrencia}"></small>
                    </div>
                    <div class="form-group col-12 col-md-4 col-lg-2" id="quantidadeSessoesGroup">
                        <label>Qtd. sessoes</label>
                        <input type="number" class="form-control" min="1" max="52" th:field="*{quantidadeSessoes}" id="quantidadeSessoes">
                        <small class="text-danger" th:errors="*{quantidadeSessoes}"></small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-12">
                        <label>Observacao</label>
                        <input type="text" class="form-control" th:field="*{observacao}">
                        <small class="text-danger" th:errors="*{observacao}"></small>
                    </div>
                </div>
                <div class="d-flex flex-wrap">
                    <button type="submit"
                            class="btn btn-primary mr-2 mb-2"
                            th:disabled="${vagasDisponiveis <= 0 or (agenda.modoAgenda.name() == 'HORARIO_SESSAO' and #lists.isEmpty(horariosDisponiveis))}">
                        <i class="nav-link-icon lnr-link mr-2"></i>Vincular paciente
                    </button>
                    <a th:href="@{/ui/agendamentos}" class="btn btn-secondary mb-2">
                        <i class="nav-link-icon lnr-menu mr-2"></i>Voltar
                    </a>
                </div>
            </form>

            <div class="mt-4">
                <h6 class="mb-2">Agendamentos da sessao</h6>
                <div class="table-responsive">
                    <table class="table table-sm table-striped">
                        <thead>
                        <tr>
                            <th>Paciente</th>
                            <th>CPF</th>
                            <th>Tipo vaga</th>
                            <th>Horario</th>
                            <th>Status</th>
                            <th>Observacao</th>
                            <th>Criado em</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(pacientesAgendados)}">
                            <td colspan="8" class="text-center">Nenhum paciente vinculado</td>
                        </tr>
                        <tr th:each="item : ${pacientesAgendados}">
                            <td th:text="${item.paciente.nomeExibicao}"></td>
                            <td th:text="${item.paciente.cpf != null ? item.paciente.cpf : '-'}"></td>
                            <td th:text="${item.tipoVaga}"></td>
                            <td th:text="${item.horaAtendimento != null ? #temporals.format(item.horaAtendimento, 'HH:mm') : '-'}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${
                                        item.status.name() == 'PENDENTE' ? 'badge-secondary' :
                                        item.status.name() == 'CONFIRMADO' ? 'badge-primary' :
                                        item.status.name() == 'ATENDIDO' ? 'badge-success' :
                                        item.status.name() == 'FALTOU' ? 'badge-warning' :
                                        'badge-danger'
                                      }"
                                      th:text="${item.status}"></span>
                            </td>
                            <td th:text="${item.observacao != null ? item.observacao : '-'}"></td>
                            <td th:text="${#temporals.format(item.criadoEm, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="text-right">
                                <div class="dropdown d-inline-block">
                                    <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                            type="button"
                                            data-toggle="dropdown"
                                            aria-haspopup="true"
                                            aria-expanded="false">
                                        <i class="nav-link-icon lnr-menu"></i>
                                    </button>
                                    <div class="dropdown-menu dropdown-menu-right">
                                        <form method="post"
                                              class="m-0"
                                              th:if="${item.status.name() != 'CONFIRMADO' and item.status.name() != 'CANCELADO'}"
                                              th:action="@{'/ui/agendamentos/' + ${agenda.id} + '/pacientes/' + ${item.id} + '/confirmar'}">
                                            <button type="submit" class="dropdown-item">
                                                <i class="nav-link-icon lnr-checkmark-circle mr-2"></i><span>Confirmar</span>
                                            </button>
                                        </form>
                                        <form method="post"
                                              class="m-0"
                                              th:if="${item.status.name() != 'FALTOU' and item.status.name() != 'CANCELADO'}"
                                              th:action="@{'/ui/agendamentos/' + ${agenda.id} + '/pacientes/' + ${item.id} + '/falta'}">
                                            <button type="submit" class="dropdown-item">
                                                <i class="nav-link-icon lnr-sad mr-2"></i><span>Faltou</span>
                                            </button>
                                        </form>
                                        <form method="post"
                                              class="m-0"
                                              th:if="${item.status.name() != 'ATENDIDO' and item.status.name() != 'CANCELADO'}"
                                              th:action="@{'/ui/agendamentos/' + ${agenda.id} + '/pacientes/' + ${item.id} + '/atendido'}">
                                            <button type="submit" class="dropdown-item">
                                                <i class="nav-link-icon lnr-smile mr-2"></i><span>Atendido</span>
                                            </button>
                                        </form>
                                        <a class="dropdown-item"
                                           th:if="${item.status.name() != 'CANCELADO'}"
                                           th:href="@{'/ui/agendamentos/' + ${agenda.id} + '/pacientes/' + ${item.id} + '/reagendar'}">
                                            <i class="nav-link-icon lnr-link mr-2"></i><span>Reagendar</span>
                                        </a>
                                        <div class="dropdown-divider" th:if="${item.status.name() != 'CANCELADO'}"></div>
                                        <form method="post"
                                              class="m-0"
                                              th:if="${item.status.name() != 'CANCELADO'}"
                                              th:action="@{'/ui/agendamentos/' + ${agenda.id} + '/pacientes/' + ${item.id} + '/excluir'}">
                                            <button type="submit"
                                                    class="dropdown-item text-danger"
                                                    onclick="return confirm('Cancelar agendamento?');">
                                                <i class="nav-link-icon lnr-trash mr-2"></i><span>Cancelar</span>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <style>
        .agenda-metricas .badge {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .agenda-paciente-form .form-group {
            margin-bottom: 1rem;
        }

        .agenda-paciente-form .multiselect-dropdown,
        .agenda-paciente-form .btn-group,
        .agenda-paciente-form .btn-group .btn,
        .agenda-paciente-form .multiselect-native-select,
        .agenda-paciente-form .multiselect-native-select .btn-group {
            width: 100% !important;
        }
    </style>

    <script>
        (function () {
            var periodicidade = document.getElementById('periodicidadeRecorrencia');
            var quantidadeGroup = document.getElementById('quantidadeSessoesGroup');
            var quantidadeInput = document.getElementById('quantidadeSessoes');
            if (!periodicidade || !quantidadeGroup || !quantidadeInput) {
                return;
            }

            function refreshRecorrencia() {
                var semanal = periodicidade.value === 'SEMANAL';
                quantidadeGroup.style.display = semanal ? '' : 'none';
                if (!semanal) {
                    quantidadeInput.value = '1';
                } else if (!quantidadeInput.value || parseInt(quantidadeInput.value, 10) < 1) {
                    quantidadeInput.value = '2';
                }
            }

            periodicidade.addEventListener('change', refreshRecorrencia);
            refreshRecorrencia();
        }());
    </script>
</th:block>
</html>
