<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Agendamento - Editar agenda' : 'Agendamento - Nova agenda', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title" th:text="${modoEdicao} ? 'Editar agenda de atendimento' : 'Nova agenda de atendimento'">Agenda</h5>

            <div class="alert alert-warning" th:if="${!agendamentoHabilitado}">
                Agendamento nao habilitado para esta unidade.
            </div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form method="post"
                  th:object="${form}"
                  th:action="${modoEdicao} ? @{'/ui/agendamentos/' + ${itemId}} : @{/ui/agendamentos}">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Cargo assistencial<span class="required-mark">*</span></label>
                        <select class="form-control"
                                id="cargoColaboradorId"
                                th:field="*{cargoColaboradorId}"
                                th:attr="data-especialidades-url-base=@{/ui/agendamentos/especialidades-por-cargo/}">
                            <option value="">Selecione</option>
                            <option th:each="cargo : ${cargos}"
                                    th:value="${cargo.id}"
                                    th:attr="data-exige-especialidade=${cargo.exigeEspecialidadeAgendamento}"
                                    th:text="${cargo.descricao}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{cargoColaboradorId}"></small>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Especialidade</label>
                        <select class="form-control" id="especialidadeId" th:field="*{especialidadeId}">
                            <option value="">Nao se aplica</option>
                            <option th:each="esp : ${especialidades}"
                                    th:value="${esp.id}"
                                    th:text="${esp.descricao}"></option>
                        </select>
                        <small id="especialidadeHint" class="text-muted d-block">Selecione uma especialidade somente quando aplicavel ao cargo.</small>
                        <small class="text-danger" th:errors="*{especialidadeId}"></small>
                    </div>
                    <div class="form-group col-md-3" th:if="${!modoEdicao}">
                        <label>Data inicio<span class="required-mark">*</span></label>
                        <input type="date" class="form-control" th:field="*{dataAgenda}">
                        <small class="text-danger" th:errors="*{dataAgenda}"></small>
                    </div>
                    <div class="form-group col-md-3" th:if="${!modoEdicao}">
                        <label>Data fim</label>
                        <input type="date" class="form-control" th:field="*{dataFim}">
                        <small class="text-danger" th:errors="*{dataFim}"></small>
                    </div>
                    <div class="form-group col-md-3" th:if="${modoEdicao}">
                        <label>Data<span class="required-mark">*</span></label>
                        <input type="date" class="form-control" th:field="*{dataAgenda}">
                        <small class="text-danger" th:errors="*{dataAgenda}"></small>
                    </div>
                    <div class="form-group col-md-3">
                        <label>Hora inicio<span class="required-mark">*</span></label>
                        <input type="time" class="form-control" th:field="*{horaInicio}">
                        <small class="text-danger" th:errors="*{horaInicio}"></small>
                    </div>
                    <div class="form-group col-md-3">
                        <label>Hora fim<span class="required-mark">*</span></label>
                        <input type="time" class="form-control" th:field="*{horaFim}">
                        <small class="text-danger" th:errors="*{horaFim}"></small>
                    </div>
                </div>

                <div class="form-row" th:if="${!modoEdicao}">
                    <div class="form-group col-md-12">
                        <label>Dias da semana sem atendimento</label>
                        <div class="d-flex flex-wrap">
                            <div class="form-check mr-4 mb-2">
                                <input class="form-check-input" type="checkbox" th:field="*{diasNaoAtende}" value="MONDAY">
                                <label class="form-check-label">Segunda</label>
                            </div>
                            <div class="form-check mr-4 mb-2">
                                <input class="form-check-input" type="checkbox" th:field="*{diasNaoAtende}" value="TUESDAY">
                                <label class="form-check-label">Terca</label>
                            </div>
                            <div class="form-check mr-4 mb-2">
                                <input class="form-check-input" type="checkbox" th:field="*{diasNaoAtende}" value="WEDNESDAY">
                                <label class="form-check-label">Quarta</label>
                            </div>
                            <div class="form-check mr-4 mb-2">
                                <input class="form-check-input" type="checkbox" th:field="*{diasNaoAtende}" value="THURSDAY">
                                <label class="form-check-label">Quinta</label>
                            </div>
                            <div class="form-check mr-4 mb-2">
                                <input class="form-check-input" type="checkbox" th:field="*{diasNaoAtende}" value="FRIDAY">
                                <label class="form-check-label">Sexta</label>
                            </div>
                            <div class="form-check mr-4 mb-2">
                                <input class="form-check-input" type="checkbox" th:field="*{diasNaoAtende}" value="SATURDAY">
                                <label class="form-check-label">Sabado</label>
                            </div>
                            <div class="form-check mr-4 mb-2">
                                <input class="form-check-input" type="checkbox" th:field="*{diasNaoAtende}" value="SUNDAY">
                                <label class="form-check-label">Domingo</label>
                            </div>
                        </div>
                        <small class="text-muted d-block">Marque apenas os dias que nao devem gerar agenda dentro do periodo.</small>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Vagas totais (automatico)</label>
                        <input type="number" class="form-control" th:field="*{vagasTotais}" readonly>
                        <small class="text-danger" th:errors="*{vagasTotais}"></small>
                        <small class="text-muted d-block" id="vagasTotaisHint">
                            Calculado automaticamente a partir do horario e intervalo.
                        </small>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Vagas retorno<span class="required-mark">*</span></label>
                        <input type="number" class="form-control" min="0" th:field="*{vagasRetorno}">
                        <small class="text-danger" th:errors="*{vagasRetorno}"></small>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Intervalo (min)<span class="required-mark">*</span></label>
                        <select class="form-control" th:field="*{intervaloMinutos}">
                            <option th:each="intervalo : ${intervalosDisponiveis}"
                                    th:value="${intervalo}"
                                    th:text="${intervalo % 60 == 0 ? (intervalo / 60) + ' hora(s) (' + intervalo + ' min)' : intervalo + ' minutos'}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{intervaloMinutos}"></small>
                    </div>
                    <div class="form-group col-md-10">
                        <label>Observacao</label>
                        <input type="text" class="form-control" th:field="*{observacao}">
                        <small class="text-danger" th:errors="*{observacao}"></small>
                    </div>
                    <div class="form-group col-md-2 d-flex align-items-center">
                        <div class="form-check mt-4">
                            <input type="checkbox" class="form-check-input" th:field="*{ativo}">
                            <label class="form-check-label" for="ativo">Ativo</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-sm">Salvar</button>
                <a th:href="@{/ui/agendamentos}" class="btn btn-secondary btn-sm">Voltar</a>
            </form>
        </div>
    </div>

    <script>
        (function () {
            var cargoSelect = document.getElementById('cargoColaboradorId');
            var especialidadeSelect = document.getElementById('especialidadeId');
            var hint = document.getElementById('especialidadeHint');
            if (!cargoSelect || !hint || !especialidadeSelect) {
                return;
            }

            var urlBase = cargoSelect.getAttribute('data-especialidades-url-base') || '/ui/agendamentos/especialidades-por-cargo/';
            var especialidadeInicial = especialidadeSelect.value;

            function preencherEspecialidades(items, selectedId) {
                especialidadeSelect.innerHTML = '';
                var optionPadrao = document.createElement('option');
                optionPadrao.value = '';
                optionPadrao.textContent = 'Nao se aplica';
                especialidadeSelect.appendChild(optionPadrao);
                items.forEach(function (item) {
                    var option = document.createElement('option');
                    option.value = item.id;
                    option.textContent = item.descricao;
                    if (selectedId && String(selectedId) === String(item.id)) {
                        option.selected = true;
                    }
                    especialidadeSelect.appendChild(option);
                });
            }

            function refreshHint(totalEspecialidades) {
                var option = cargoSelect.options[cargoSelect.selectedIndex];
                var exige = option && option.dataset && option.dataset.exigeEspecialidade === 'true';
                if (!cargoSelect.value) {
                    hint.textContent = 'Selecione o cargo para carregar as especialidades permitidas.';
                    return;
                }
                if (exige && totalEspecialidades === 0) {
                    hint.textContent = 'Este cargo exige especialidade, mas nao ha especialidade vinculada a ele.';
                    return;
                }
                hint.textContent = exige
                    ? 'Este cargo exige especialidade para o agendamento.'
                    : 'Este cargo permite agenda sem especialidade (Nao se aplica).';
            }

            function carregarEspecialidades(cargoId, selectedId) {
                preencherEspecialidades([], null);
                if (!cargoId) {
                    refreshHint(0);
                    return;
                }
                fetch(urlBase + cargoId)
                    .then(function (response) { return response.json(); })
                    .then(function (items) {
                        preencherEspecialidades(items, selectedId);
                        if (selectedId && especialidadeSelect.value === '' && items.length > 0) {
                            especialidadeSelect.selectedIndex = 0;
                        }
                        refreshHint(items.length);
                    })
                    .catch(function () {
                        preencherEspecialidades([], null);
                        refreshHint(0);
                    });
            }

            cargoSelect.addEventListener('change', function () {
                carregarEspecialidades(this.value, null);
            });
            carregarEspecialidades(cargoSelect.value, especialidadeInicial);
        }());

        (function () {
            var horaInicioInput = document.getElementById('horaInicio');
            var horaFimInput = document.getElementById('horaFim');
            var intervaloInput = document.getElementById('intervaloMinutos');
            var vagasTotaisInput = document.getElementById('vagasTotais');
            var vagasRetornoInput = document.getElementById('vagasRetorno');
            var vagasTotaisHint = document.getElementById('vagasTotaisHint');
            if (!horaInicioInput || !horaFimInput || !intervaloInput || !vagasTotaisInput || !vagasRetornoInput || !vagasTotaisHint) {
                return;
            }

            function ajustarLimiteRetorno(vagasTotais) {
                vagasRetornoInput.max = String(vagasTotais);
                var retornoAtual = parseInt(vagasRetornoInput.value, 10);
                if (!isNaN(retornoAtual) && retornoAtual > vagasTotais) {
                    vagasRetornoInput.value = String(vagasTotais);
                }
            }

            function parseMinutes(value) {
                if (!value || value.indexOf(':') < 0) {
                    return null;
                }
                var parts = value.split(':');
                var hour = parseInt(parts[0], 10);
                var minute = parseInt(parts[1], 10);
                if (isNaN(hour) || isNaN(minute)) {
                    return null;
                }
                return (hour * 60) + minute;
            }

            function atualizarVagasTotais() {
                var inicioMin = parseMinutes(horaInicioInput.value);
                var fimMin = parseMinutes(horaFimInput.value);
                var intervalo = parseInt(intervaloInput.value, 10);

                if (inicioMin === null || fimMin === null || isNaN(intervalo) || intervalo <= 0) {
                    vagasTotaisInput.value = '0';
                    ajustarLimiteRetorno(0);
                    vagasTotaisHint.textContent = 'Preencha horario inicial, final e intervalo para calcular automaticamente.';
                    return;
                }
                var duracao = fimMin - inicioMin;
                if (duracao <= 0) {
                    vagasTotaisInput.value = '0';
                    ajustarLimiteRetorno(0);
                    vagasTotaisHint.textContent = 'Hora final deve ser maior que hora inicial.';
                    return;
                }
                if (duracao % intervalo !== 0) {
                    vagasTotaisInput.value = '0';
                    ajustarLimiteRetorno(0);
                    vagasTotaisHint.textContent = 'Intervalo deve fechar exatamente no periodo informado.';
                    return;
                }

                var vagas = Math.floor(duracao / intervalo);
                vagasTotaisInput.value = String(vagas);
                ajustarLimiteRetorno(vagas);
                vagasTotaisHint.textContent = 'Total calculado automaticamente: ' + vagas + ' vaga(s).';
            }

            horaInicioInput.addEventListener('input', atualizarVagasTotais);
            horaInicioInput.addEventListener('change', atualizarVagasTotais);
            horaFimInput.addEventListener('input', atualizarVagasTotais);
            horaFimInput.addEventListener('change', atualizarVagasTotais);
            intervaloInput.addEventListener('change', atualizarVagasTotais);
            vagasRetornoInput.addEventListener('input', function () {
                var vagasTotais = parseInt(vagasTotaisInput.value, 10);
                if (isNaN(vagasTotais) || vagasTotais < 0) {
                    vagasTotais = 0;
                }
                ajustarLimiteRetorno(vagasTotais);
            });
            vagasRetornoInput.addEventListener('change', function () {
                var vagasTotais = parseInt(vagasTotaisInput.value, 10);
                if (isNaN(vagasTotais) || vagasTotais < 0) {
                    vagasTotais = 0;
                }
                ajustarLimiteRetorno(vagasTotais);
            });

            atualizarVagasTotais();
        }());
    </script>
</th:block>
</html>
