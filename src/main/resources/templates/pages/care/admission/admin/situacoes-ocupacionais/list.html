<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout('HIS | Situacoes Ocupacionais', ~{::section})}">
    <section>
        <div class="main-card card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title mb-0">Situacoes Ocupacionais</h5>
                    <a class="btn btn-primary btn-sm" th:href="@{/ui/admin/situacoes-ocupacionais/novo}">Nova situacao ocupacional</a>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>Descricao</th>
                            <th>Ativo</th>
                            <th class="text-right">Acoes</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${items}">
                            <td th:text="${item.descricao}">Descricao</td>
                            <td th:text="${item.ativo ? 'Sim' : 'Nao'}">Sim</td>
                            <td class="text-right">
                                <a class="btn btn-secondary btn-sm" th:href="@{/ui/admin/situacoes-ocupacionais/{id}/editar(id=${item.id})}">Editar</a>
                                <form class="d-inline" th:action="@{/ui/admin/situacoes-ocupacionais/{id}/excluir(id=${item.id})}" method="post">
                                    <button type="submit" class="btn btn-danger btn-sm">Excluir</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(items)}">
                            <td colspan="3">Nenhuma situacao ocupacional cadastrada.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</th:block>
</body>
</html>
