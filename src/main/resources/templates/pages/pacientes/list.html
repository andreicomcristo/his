<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout('HIS | Pacientes', ~{::section})}">
    <section>
        <style>
            .his-acoes-dropdown .dropdown-toggle::after {
                display: none;
            }

            .his-acoes-trigger {
                min-width: 52px;
                height: 38px;
                padding: 0 10px;
                border: 1px solid #d8dbe2;
                border-radius: 7px;
                background: #f5f6f8;
                color: #4b5563;
                box-shadow: none;
            }

            .his-acoes-trigger:hover,
            .his-acoes-trigger:focus {
                background: #eef0f3;
                color: #2f3542;
                box-shadow: none;
            }

            .his-acoes-trigger .fa {
                font-size: 16px;
            }

            .his-acoes-trigger .caret {
                margin-left: 8px;
            }

            .his-acoes-menu {
                min-width: 280px;
                padding: 0;
                border: 1px solid rgba(0, 0, 0, 0.15);
                border-radius: 9px;
                box-shadow: 0 10px 24px rgba(31, 41, 55, 0.14);
                overflow: hidden;
            }

            .his-acoes-header {
                padding: 18px 20px 8px;
                font-size: 13px;
                font-weight: 700;
                letter-spacing: 0.04em;
                color: #d96245;
            }

            .his-acoes-body {
                padding: 2px 0 10px;
            }

            .his-acoes-menu .dropdown-item {
                padding: 10px 20px;
                font-size: 15px;
                font-weight: 500;
                color: #2f3542;
                white-space: normal;
            }

            .his-acoes-menu .dropdown-item:hover,
            .his-acoes-menu .dropdown-item:focus {
                background: #f7f7f8;
                color: #1f2937;
            }

            .his-acoes-menu .dropdown-divider {
                margin: 8px 0;
            }

            .his-acoes-menu form {
                margin: 0;
            }

            .his-acoes-menu .dropdown-item.btn-link {
                width: 100%;
                border: 0;
                background: transparent;
                text-align: left;
                text-decoration: none;
            }
        </style>
        <div class="row mb-3">
            <div class="col-md-12">
                <div class="main-card card">
                    <div class="card-body">
                        <h5 class="card-title">Pacientes</h5>

                        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                        <form th:action="@{/ui/pacientes}" method="get" class="mb-3">
                            <div class="form-row">
                                <div class="form-group col-md-4">
                                    <label for="nome">Nome</label>
                                    <input id="nome" name="nome" type="text" class="form-control" th:value="${nome}">
                                </div>
                                <div class="form-group col-md-3">
                                    <label for="cpf">CPF</label>
                                    <input id="cpf" name="cpf" type="text" class="form-control" th:value="${cpf}">
                                </div>
                                <div class="form-group col-md-3">
                                    <label for="cns">CNS</label>
                                    <input id="cns" name="cns" type="text" class="form-control" th:value="${cns}">
                                </div>
                                <div class="form-group col-md-2 d-flex align-items-end">
                                    <button type="submit" class="btn btn-primary btn-block">Filtrar</button>
                                </div>
                            </div>
                        </form>

                        <div class="mb-3">
                            <a th:href="@{/ui/pacientes/novo}" class="btn btn-primary mr-2">Novo Paciente</a>
                            <a th:href="@{/ui/pacientes/temporario}" class="btn btn-warning">Criar Temporario</a>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-bordered table-hover">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nome</th>
                                    <th>CPF</th>
                                    <th>CNS</th>
                                    <th>Sexo</th>
                                    <th>Status</th>
                                    <th>Acoes</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:if="${#lists.isEmpty(pacientes)}">
                                    <td colspan="7" class="text-center">Nenhum paciente encontrado</td>
                                </tr>
                                <tr th:each="p : ${pacientes}">
                                    <td th:text="${p.id}">1</td>
                                    <td>
                                        <span th:text="${p.nome}">Nome</span>
                                        <span class="badge badge-warning ml-1" th:if="${p.temporario}">TEMPORARIO</span>
                                    </td>
                                    <td th:text="${p.cpf}">-</td>
                                    <td th:text="${p.cns}">-</td>
                                    <td th:text="${p.sexo}">NI</td>
                                    <td>
                                        <span class="badge badge-success" th:if="${p.ativo and p.mergedInto == null}">ATIVO</span>
                                        <span class="badge badge-danger" th:if="${!p.ativo}">INATIVO</span>
                                        <span class="badge badge-secondary" th:if="${p.mergedInto != null}">
                                            MERGED -> <span th:text="${p.mergedInto.id}">0</span>
                                        </span>
                                    </td>
                                    <td>
                                        <div class="dropdown d-inline-block his-acoes-dropdown">
                                            <button type="button"
                                                    class="btn his-acoes-trigger dropdown-toggle"
                                                    data-toggle="dropdown"
                                                    aria-haspopup="true"
                                                    aria-expanded="false"
                                                    title="Ações"
                                                    aria-label="Ações">
                                                <i class="fa fa-list-ul"></i>
                                                <span class="caret"></span>
                                            </button>
                                            <div class="dropdown-menu dropdown-menu-right his-acoes-menu" role="menu">
                                                <div class="his-acoes-header">OPÇÕES</div>
                                                <div class="his-acoes-body">
                                                    <a th:href="@{/ui/pacientes/{id}/editar(id=${p.id})}" class="dropdown-item">Editar</a>
                                                    <a th:if="${canCriarAtendimento and p.ativo and p.mergedInto == null and !p.temporario}"
                                                       th:href="@{/ui/atendimentos/novo(pacienteId=${p.id})}"
                                                       class="dropdown-item">Novo atendimento</a>
                                                    <a th:if="${p.temporario and p.ativo and p.mergedInto == null}"
                                                       th:href="@{/ui/pacientes/{id}/identificar(id=${p.id})}"
                                                       class="dropdown-item">Identificar / Merge</a>
                                                    <div th:if="${p.ativo or (!p.ativo and p.mergedInto == null)}" class="dropdown-divider"></div>
                                                    <form th:if="${p.ativo}" th:action="@{/ui/pacientes/{id}/cancelar(id=${p.id})}" method="post">
                                                        <button type="submit" class="dropdown-item btn-link">Cancelar</button>
                                                    </form>
                                                    <form th:if="${!p.ativo and p.mergedInto == null}" th:action="@{/ui/pacientes/{id}/restaurar(id=${p.id})}" method="post">
                                                        <button type="submit" class="dropdown-item btn-link">Restaurar</button>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </section>
</th:block>
</body>
</html>
