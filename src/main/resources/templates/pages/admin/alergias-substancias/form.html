<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administracao - Editar Substancia de Alergia' : 'Administracao - Nova Substancia de Alergia', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title" th:text="${modoEdicao} ? 'Editar substancia de alergia' : 'Nova substancia de alergia'">Substancia de alergia</h5>
            <form method="post"
                  th:object="${form}"
                  th:action="${modoEdicao} ? @{'/ui/admin/alergias-substancias/' + ${itemId}} : @{/ui/admin/alergias-substancias}">
                <div class="form-row">
                    <div class="form-group col-md-8">
                        <label>Descricao<span class="required-mark">*</span></label>
                        <input type="text" class="form-control" th:field="*{descricao}">
                        <small class="text-danger" th:errors="*{descricao}"></small>
                    </div>
                    <div class="form-group col-md-4 d-flex align-items-center">
                        <div class="form-check mt-4">
                            <input type="checkbox" class="form-check-input" th:field="*{ativo}">
                            <label class="form-check-label" for="ativo">Ativo</label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Salvar</button>
                <a th:href="@{/ui/admin/alergias-substancias}" class="btn btn-secondary btn-sm">Voltar</a>
            </form>
        </div>
    </div>
</th:block>
</html>
