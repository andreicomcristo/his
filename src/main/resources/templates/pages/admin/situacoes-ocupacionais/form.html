<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout(${modoEdicao} ? 'HIS | Editar Situacao Ocupacional' : 'HIS | Nova Situacao Ocupacional', ~{::section})}">
    <section>
        <div class="main-card card">
            <div class="card-body">
                <h5 class="card-title" th:text="${modoEdicao} ? 'Editar Situacao Ocupacional' : 'Nova Situacao Ocupacional'">Situacao Ocupacional</h5>

                <form th:action="${modoEdicao} ? @{/ui/admin/situacoes-ocupacionais/{id}(id=${itemId})} : @{/ui/admin/situacoes-ocupacionais}"
                      th:object="${form}" method="post">
                    <div class="form-row">
                        <div class="form-group col-md-8">
                            <label>Descricao<span class="required-mark">*</span></label>
                            <input type="text" class="form-control" th:field="*{descricao}">
                            <small class="text-danger" th:errors="*{descricao}"></small>
                        </div>
                        <div class="form-group col-md-4 d-flex align-items-center">
                            <div class="form-check mt-4">
                                <input class="form-check-input" type="checkbox" th:field="*{ativo}">
                                <label class="form-check-label" for="ativo">Ativo</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary mr-2">Salvar</button>
                    <a th:href="@{/ui/admin/situacoes-ocupacionais}" class="btn btn-secondary">Voltar</a>
                </form>
            </div>
        </div>
    </section>
</th:block>
</body>
</html>
