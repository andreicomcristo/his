<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administracao - Cadastros do Paciente', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title">Cadastros do Paciente</h5>
            <div class="row">
                <div class="col-md-4 mb-3" th:each="catalogo : ${catalogos}">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <div>
                                <h6 class="mb-2" th:text="${catalogo.titulo}"></h6>
                                <p class="text-muted mb-3">Gerenciar lista de opções usada no cadastro de paciente.</p>
                            </div>
                            <a class="btn btn-outline-primary btn-sm" th:href="@{'/ui/admin/paciente-catalogos/' + ${catalogo.slug}}">Abrir</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
</html>
