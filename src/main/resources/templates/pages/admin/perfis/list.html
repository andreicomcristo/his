<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administracao - Perfis', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Perfis</h5>
                <a class="btn btn-primary btn-sm" th:href="@{/ui/admin/perfis/novo}">Novo perfil</a>
            </div>
            <form method="get" th:action="@{/ui/admin/perfis}" class="form-inline mb-3">
                <input type="text" name="q" class="form-control mr-2" placeholder="Nome do perfil" th:value="${q}">
                <button class="btn btn-outline-secondary btn-sm" type="submit">Buscar</button>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${perfis}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.nome}"></td>
                    <td class="text-right">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{'/ui/admin/perfis/' + ${p.id} + '/editar'}">Editar</a>
                        <a class="btn btn-sm btn-outline-info" th:href="@{'/ui/admin/perfis/' + ${p.id} + '/permissoes'}">Permissoes</a>
                        <form th:action="@{'/ui/admin/perfis/' + ${p.id} + '/remover'}" method="post" class="d-inline">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Remover</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</html>
