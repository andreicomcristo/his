<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administracao - Editar UF' : 'Administracao - Nova UF', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title" th:text="${modoEdicao} ? 'Editar UF' : 'Nova UF'"></h5>
            <form th:object="${form}" method="post"
                  th:action="${modoEdicao} ? @{'/ui/admin/unidades-federativas/' + ${itemId}} : @{/ui/admin/unidades-federativas}">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Nome<span class="required-mark">*</span></label>
                        <input type="text" class="form-control" th:field="*{nome}">
                        <small class="text-danger" th:errors="*{nome}"></small>
                    </div>
                    <div class="form-group col-md-3">
                        <label>Sigla<span class="required-mark">*</span></label>
                        <input type="text" class="form-control" maxlength="2" th:field="*{sigla}">
                        <small class="text-danger" th:errors="*{sigla}"></small>
                    </div>
                    <div class="form-group col-md-3">
                        <label>Cod. IBGE</label>
                        <input type="text" class="form-control" maxlength="2" th:field="*{codigoIbge}">
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary mr-2">Salvar</button>
                    <a class="btn btn-secondary" th:href="@{/ui/admin/unidades-federativas}">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</th:block>
</html>
