<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administracao - Procedencias', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Procedencias</h5>
                <a class="btn btn-primary btn-sm" th:href="@{/ui/admin/procedencias/novo}">Nova procedencia</a>
            </div>

            <form method="get" class="mb-3">
                <div class="form-row">
                    <div class="form-group col-md-5">
                        <label class="filtro-label"><strong>Busca</strong></label>
                        <input type="text" name="q" class="form-control"
                               placeholder="Buscar por descricao, tipo, bairro, municipio ou unidade"
                               th:value="${q}">
                    </div>
                    <div class="form-group col-md-3">
                        <label class="filtro-label"><strong>Situacao</strong></label>
                        <select name="ativo" class="form-control">
                            <option value="" th:selected="${ativo == null}">TODOS</option>
                            <option value="true" th:selected="${ativo != null and ativo}">ATIVO</option>
                            <option value="false" th:selected="${ativo != null and !ativo}">INATIVO</option>
                        </select>
                    </div>
                    <div class="form-group col-md-2 d-flex align-items-end">
                        <button class="btn btn-outline-secondary btn-sm btn-block" type="submit">Buscar</button>
                    </div>
                    <div class="form-group col-md-2 d-flex align-items-end">
                        <a class="btn btn-outline-secondary btn-sm btn-block" th:href="@{/ui/admin/procedencias}">Limpar</a>
                    </div>
                </div>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="table-responsive">
                <table class="table table-sm table-striped">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tipo</th>
                        <th>Descricao</th>
                        <th>Bairro</th>
                        <th>Municipio</th>
                        <th>Unidade</th>
                        <th>Ativo</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.id}">1</td>
                        <td th:text="${item.tipoProcedencia != null ? item.tipoProcedencia.descricao : '-'}">BAIRRO</td>
                        <td th:text="${item.descricao}">CENTRO</td>
                        <td th:text="${item.bairro != null ? item.bairro.nome : '-'}">CENTRO</td>
                        <td th:text="${item.municipio != null ? item.municipio.nome : (item.bairro != null and item.bairro.municipio != null ? item.bairro.municipio.nome : '-')}">MACEIO</td>
                        <td th:text="${item.unidade != null ? item.unidade.nome : 'GLOBAL'}">GLOBAL</td>
                        <td th:text="${item.ativo ? 'SIM' : 'NAO'}">SIM</td>
                        <td class="text-right">
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{'/ui/admin/procedencias/' + ${item.id} + '/editar'}">Editar</a>
                            <form method="post" class="d-inline"
                                  th:action="@{'/ui/admin/procedencias/' + ${item.id} + '/excluir'}">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Excluir procedencia?');">Excluir</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td colspan="8" class="text-center text-muted">Nenhuma procedencia encontrada</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>
</html>
