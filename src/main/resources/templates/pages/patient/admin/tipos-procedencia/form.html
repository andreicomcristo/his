<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administracao - Editar Tipo de Procedencia' : 'Administracao - Novo Tipo de Procedencia', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title"
                th:text="${modoEdicao} ? 'Editar tipo de procedencia' : 'Novo tipo de procedencia'">Tipo de procedencia</h5>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form method="post"
                  th:object="${form}"
                  th:action="${modoEdicao} ? @{'/ui/admin/tipos-procedencia/' + ${itemId}} : @{/ui/admin/tipos-procedencia}">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Descricao<span class="required-mark">*</span></label>
                        <input type="text" class="form-control" th:field="*{descricao}" maxlength="80">
                        <small class="text-danger" th:errors="*{descricao}"></small>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-sm">Salvar</button>
                <a th:href="@{/ui/admin/tipos-procedencia}" class="btn btn-secondary btn-sm">Voltar</a>
            </form>
        </div>
    </div>
</th:block>
</html>
