<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? |Administracao - Editar ${catalogo.titulo}| : |Administracao - Novo ${catalogo.titulo}|, ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <h5 class="card-title" th:text="${modoEdicao} ? |Editar ${catalogo.titulo}| : |Novo ${catalogo.titulo}|"></h5>
            <form th:action="${modoEdicao} ? @{'/ui/admin/paciente-catalogos/' + ${catalogo.slug} + '/' + ${itemId}} : @{'/ui/admin/paciente-catalogos/' + ${catalogo.slug}}"
                  th:object="${form}" method="post">
                <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
                    <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                </div>

                <div class="form-row" th:if="${catalogo.usaNomeEDescricao}">
                    <div class="form-group col-md-6">
                        <label>Nome<span class="required-mark">*</span></label>
                        <input type="text" class="form-control" th:field="*{nome}">
                    </div>
                    <div class="form-group col-md-6">
                        <label>Descricao</label>
                        <input type="text" class="form-control" th:field="*{descricaoComplementar}">
                    </div>
                </div>

                <div class="form-row" th:if="${!catalogo.usaNomeEDescricao}">
                    <div class="form-group" th:classappend="${catalogo.usaCodigo or catalogo.usaCodIbge or catalogo.usaCboCod or catalogo.usaTipoProcedencia} ? 'col-md-6' : 'col-md-12'">
                        <label>
                            <span th:text="${catalogo == T(br.com.his.admin.dto.PacienteCatalogoTipo).PROFISSAO} ? 'Nome' : 'Descricao'"></span><span class="required-mark">*</span>
                        </label>
                        <input th:if="${catalogo == T(br.com.his.admin.dto.PacienteCatalogoTipo).PROFISSAO}" type="text" class="form-control" th:field="*{nome}">
                        <input th:unless="${catalogo == T(br.com.his.admin.dto.PacienteCatalogoTipo).PROFISSAO}" type="text" class="form-control" th:field="*{descricao}">
                    </div>
                    <div class="form-group col-md-6" th:if="${catalogo.usaCodigo}">
                        <label>Codigo</label>
                        <input type="text" class="form-control" th:field="*{codigo}">
                    </div>
                    <div class="form-group col-md-6" th:if="${catalogo.usaCodIbge}">
                        <label>Cod. IBGE</label>
                        <input type="text" class="form-control" th:field="*{codIbge}">
                    </div>
                    <div class="form-group col-md-6" th:if="${catalogo.usaCboCod}">
                        <label>CBO</label>
                        <input type="text" class="form-control" th:field="*{cboCod}">
                    </div>
                    <div class="form-group col-md-6" th:if="${catalogo.usaTipoProcedencia}">
                        <label>Tipo de procedencia<span class="required-mark">*</span></label>
                        <select class="form-control" th:field="*{tipoProcedenciaId}">
                            <option value="">Selecione</option>
                            <option th:each="item : ${tiposProcedencia}" th:value="${item.id}" th:text="${item.descricao}"></option>
                        </select>
                    </div>
                    <div class="form-group col-md-6" th:if="${catalogo.usaTipoProcedencia}">
                        <label>Unidade</label>
                        <select class="form-control" th:field="*{unidadeId}">
                            <option value="">Global</option>
                            <option th:each="item : ${unidades}" th:value="${item.id}" th:text="${item.nome}"></option>
                        </select>
                    </div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary mr-2">Salvar</button>
                    <a class="btn btn-secondary" th:href="@{'/ui/admin/paciente-catalogos/' + ${catalogo.slug}}">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</th:block>
</html>
