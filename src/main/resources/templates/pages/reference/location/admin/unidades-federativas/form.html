<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administracao - Editar UF' : 'Administracao - Nova UF', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title" th:text="${modoEdicao} ? 'Editar UF' : 'Nova UF'"></h5>
            </div>
            <form th:object="${form}" method="post"
                th:action="${modoEdicao} ? @{'/ui/admin/unidades-federativas/' + ${itemId}} : @{/ui/admin/unidades-federativas}">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Descricao<span class="required-mark">*</span></label>
                        <input type="text" class="form-control" th:field="*{descricao}"
                            placeholder="Informe a descricao">
                        <small class="text-danger" th:errors="*{descricao}"></small>
                    </div>
                    <div class="form-group col-md-3">
                        <label>Sigla<span class="required-mark">*</span></label>
                        <input type="text" class="form-control" maxlength="2" th:field="*{sigla}" placeholder="Ex.: SP">
                        <small class="text-danger" th:errors="*{sigla}"></small>
                    </div>
                    <div class="form-group col-md-3">
                        <label>Cod. IBGE</label>
                        <input type="text" class="form-control" maxlength="2" th:field="*{codigoIbge}"
                            placeholder="Ex.: 35">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 mb-0">
                        <div class="d-flex">
                            <button type="submit" class="btn btn-primary btn-sm mr-2">
                                <i class="nav-link-icon lnr-checkmark-circle mr-2"></i>Salvar
                            </button>
                            <a class="btn btn-secondary btn-sm" th:href="@{/ui/admin/unidades-federativas}">
                                <i class="nav-link-icon lnr-exit mr-2"></i>Voltar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</th:block>

</html>
