<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administracao - Editar Bairro' : 'Administracao - Novo Bairro', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title" th:text="${modoEdicao} ? 'Editar Bairro' : 'Novo Bairro'"></h5>
            </div>
            <form th:object="${form}" method="post"
                  th:action="${modoEdicao} ? @{'/ui/admin/bairros/' + ${itemId}} : @{/ui/admin/bairros}">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Unidade Federativa<span class="required-mark">*</span></label>
                        <select class="multiselect-dropdown form-control" th:field="*{unidadeFederativaId}" id="unidadeFederativaId">
                            <option value="">Selecione</option>
                            <option th:each="uf : ${ufs}" th:value="${uf.id}" th:text="${uf.descricao + ' - ' + uf.sigla}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{unidadeFederativaId}"></small>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Municipio<span class="required-mark">*</span></label>
                        <select class="multiselect-dropdown form-control" th:field="*{municipioId}" id="municipioId">
                            <option value="">Selecione</option>
                            <option th:each="Municipio : ${municipios}" th:value="${Municipio.id}" th:text="${Municipio.nome}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{municipioId}"></small>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Nome<span class="required-mark">*</span></label>
                        <input type="text"
                               class="form-control"
                               th:field="*{nome}"
                               placeholder="Informe o nome do bairro">
                        <small class="text-danger" th:errors="*{nome}"></small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 mb-0">
                        <div class="d-flex">
                            <button type="submit" class="btn btn-primary btn-sm mr-2">
                                <i class="nav-link-icon lnr-checkmark-circle mr-2"></i>Salvar
                            </button>
                            <a class="btn btn-secondary btn-sm" th:href="@{/ui/admin/bairros}">
                                <i class="nav-link-icon lnr-exit mr-2"></i>Voltar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var ufSelect = document.getElementById('unidadeFederativaId');
            var MunicipioSelect = document.getElementById('municipioId');

            function resetMunicipios() {
                MunicipioSelect.innerHTML = '<option value="">Selecione</option>';
                if (window.jQuery && window.jQuery.fn && window.jQuery.fn.select2) {
                    window.jQuery(MunicipioSelect).trigger('change');
                }
            }

            function loadMunicipios(ufId, selectedMunicipioId) {
                resetMunicipios();
                if (!ufId) {
                    return;
                }
                fetch('/ui/admin/municipios/por-uf/' + ufId)
                    .then(function (response) { return response.json(); })
                    .then(function (items) {
                        items.forEach(function (item) {
                            var option = document.createElement('option');
                            option.value = item.id;
                            option.textContent = item.descricao;
                            if (selectedMunicipioId && String(selectedMunicipioId) === String(item.id)) {
                                option.selected = true;
                            }
                            MunicipioSelect.appendChild(option);
                        });
                        if (window.jQuery && window.jQuery.fn && window.jQuery.fn.select2) {
                            window.jQuery(MunicipioSelect).trigger('change');
                        }
                    });
            }

            if (ufSelect && MunicipioSelect) {
                var selectedMunicipioId = MunicipioSelect.value;
                if (ufSelect.value) {
                    loadMunicipios(ufSelect.value, selectedMunicipioId);
                } else {
                    resetMunicipios();
                }
                $(ufSelect).on('change', function () {
                    loadMunicipios(this.value, null);
                });
            }
        });
    </script>
</th:block>
</html>
