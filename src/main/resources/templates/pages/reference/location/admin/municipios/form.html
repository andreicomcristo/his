<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${modoEdicao} ? 'Administracao - Editar Municipio' : 'Administracao - Novo Municipio', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
            <h5 class="card-title" th:text="${modoEdicao} ? 'Editar Municipio' : 'Novo Municipio'"></h5>
            </div>
            <form th:object="${form}" method="post"
                  th:action="${modoEdicao} ? @{'/ui/admin/municipios/' + ${itemId}} : @{/ui/admin/municipios}">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>UF<span class="required-mark">*</span></label>
                        <select class="multiselect-dropdown form-control" th:field="*{unidadeFederativaId}">
                            <option value="">Selecione</option>
                            <option th:each="uf : ${ufs}" th:value="${uf.id}" th:text="${uf.descricao + ' - ' + uf.sigla}"></option>
                        </select>
                        <small class="text-danger" th:errors="*{unidadeFederativaId}"></small>
                    </div>
                    <div class="form-group col-md-5">
                        <label>Nome<span class="required-mark">*</span></label>
                        <input type="text"
                               class="form-control"
                               th:field="*{nome}"
                               placeholder="Informe o nome do municipio">
                        <small class="text-danger" th:errors="*{nome}"></small>
                    </div>
                    <div class="form-group col-md-3">
                        <label>Cod. IBGE</label>
                        <input type="text"
                               class="form-control"
                               maxlength="5"
                               th:field="*{codigoIbge}"
                               placeholder="Informe o codigo IBGE">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 mb-0">
                        <div class="d-flex">
                            <button type="submit" class="btn btn-primary btn-sm mr-2">
                                <i class="nav-link-icon lnr-checkmark-circle mr-2"></i>Salvar
                            </button>
                            <a class="btn btn-secondary btn-sm" th:href="@{/ui/admin/municipios}">
                                <i class="nav-link-icon lnr-exit mr-2"></i>Voltar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</th:block>
</html>
