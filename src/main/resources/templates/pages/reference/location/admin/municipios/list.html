<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administracao - Municipios', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title">Municipios</h5>
                <div class="btn-group btn-group-sm" role="group">
                    <a class="btn btn-outline-info"
                       th:href="@{/ui/admin/municipios/cancelados}"
                       data-toggle="tooltip"
                       data-placement="top"
                       title="Visualizar municipios cancelados">
                        <i class="nav-link-icon lnr-book mr-2"></i>Cancelados
                    </a>
                    <a class="btn btn-primary"
                       th:href="@{/ui/admin/municipios/novo}"
                       data-toggle="tooltip"
                       data-placement="top"
                       title="Adicionar um novo municipio">
                        <i class="nav-link-icon lnr-plus-circle mr-2"></i>Adicionar
                    </a>
                </div>
            </div>

            <form method="get" th:action="@{/ui/admin/municipios}">
                <div class="form-row">
                    <div class="form-group col-md-12">
                        <label class="filtro-label">Pesquisa</label>
                        <input type="text"
                               name="q"
                               class="form-control"
                               placeholder="Buscar por municipio ou UF"
                               th:value="${q}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-12 d-flex">
                        <button class="btn btn-sm btn-primary mr-2" type="submit">
                            <i class="nav-link-icon lnr-magnifier mr-2"></i>Buscar
                        </button>
                        <a th:href="@{/ui/admin/municipios}" class="btn btn-sm btn-secondary">
                            <i class="nav-link-icon lnr-cross mr-2"></i>Limpar
                        </a>
                    </div>
                </div>
            </form>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Descricao</th>
                    <th>UF</th>
                    <th class="text-center">Opcoes</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(items)}">
                    <td colspan="4" class="text-center">Nenhum municipio encontrado</td>
                </tr>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.descricao}"></td>
                    <td th:text="${item.unidadeFederativa.sigla}"></td>
                    <td class="text-center">
                        <div class="dropdown d-inline-block">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                    type="button"
                                    data-toggle="dropdown"
                                    aria-haspopup="true"
                                    aria-expanded="false">
                                <i class="nav-link-icon lnr-menu"></i>
                            </button>
                            <div class="dropdown-menu dropdown-menu-right">
                                <a class="dropdown-item text-warning"
                                   th:href="@{'/ui/admin/municipios/' + ${item.id} + '/editar'}">
                                    <i class="nav-link-icon lnr-pencil mr-2"></i><span>Editar</span>
                                </a>
                                <button type="button"
                                        class="dropdown-item text-danger js-municipio-action"
                                        data-action="excluir"
                                        th:data-action-url="@{'/ui/admin/municipios/' + ${item.id} + '/excluir'}"
                                        th:data-item-descricao="${item.descricao}">
                                    <i class="nav-link-icon lnr-trash mr-2"></i><span>Excluir</span>
                                </button>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <form id="municipioActionForm" method="post" class="d-none">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>

    <div class="modal fade" id="municipioActionModal" tabindex="-1" role="dialog"
         aria-labelledby="municipioActionModalTitle" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="municipioActionModalTitle">Excluir municipio</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Fechar">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p class="mb-0" id="municipioActionModalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="nav-link-icon lnr-cross mr-2"></i>Cancelar
                    </button>
                    <button type="button" class="btn btn-danger" id="municipioActionModalConfirmBtn">
                        <i class="nav-link-icon lnr-trash mr-2"></i>Excluir
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var actionButtons = document.querySelectorAll('.js-municipio-action');
            var actionForm = document.getElementById('municipioActionForm');
            var modalEl = document.getElementById('municipioActionModal');
            var modalMessageEl = document.getElementById('municipioActionModalMessage');
            var confirmBtn = document.getElementById('municipioActionModalConfirmBtn');
            var pendingActionUrl = null;

            actionButtons.forEach(function (button) {
                button.addEventListener('click', function () {
                    pendingActionUrl = this.getAttribute('data-action-url');
                    var pendingDescricao = this.getAttribute('data-item-descricao') || '';
                    modalMessageEl.textContent = 'Deseja excluir o municipio "' + pendingDescricao + '"? Ele recebera dt_cancelamento e nao sera mais listado.';

                    if (window.jQuery) {
                        var dropdown = window.jQuery(this).closest('.dropdown');
                        if (dropdown.length && dropdown.hasClass('show')) {
                            dropdown.find('[data-toggle="dropdown"]').dropdown('toggle');
                        }
                        window.jQuery(modalEl).modal('show');
                    }
                });
            });

            confirmBtn.addEventListener('click', function () {
                if (!pendingActionUrl) {
                    return;
                }
                actionForm.setAttribute('action', pendingActionUrl);
                actionForm.submit();
            });
        });
    </script>
</th:block>
</html>
