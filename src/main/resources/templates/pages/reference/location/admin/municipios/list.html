<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administracao - Municipios', ~{::content})}">
<th:block th:fragment="content">
    <div class="main-card mb-3 card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0">Municipios</h5>
                <a class="btn btn-primary btn-lg" th:href="@{/ui/admin/municipios/novo}">
                    <i class="nav-link-icon lnr-plus-circle mr-2"></i>Municipio
                </a>
            </div>
            <form method="get" class="form-inline mb-3">
                <input type="text" name="q" class="form-control col-lg-8 mr-2" placeholder="Buscar por municipio ou UF" th:value="${q}">
                <button class="btn btn-outline-secondary btn-lg" type="submit">
                    <i class="nav-link-icon lnr-magnifier mr-2"></i>Buscar
                </button>
            </form>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <table class="table table-sm table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>UF</th>
                    <th>Cod. IBGE</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.nome}"></td>
                    <td th:text="${item.unidadeFederativa.sigla}"></td>
                    <td th:text="${item.codigoIbge}"></td>
                    <td class="text-right">
                        <div class="dropdown d-inline-block">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                    type="button"
                                    data-toggle="dropdown"
                                    aria-haspopup="true"
                                    aria-expanded="false">
                                <i class="nav-link-icon lnr-menu"></i>
                            </button>
                            <div class="dropdown-menu dropdown-menu-right">
                                <a class="dropdown-item"
                                   th:href="@{'/ui/admin/municipios/' + ${item.id} + '/editar'}">
                                    <i class="nav-link-icon lnr-pencil mr-2"></i><span>Editar</span>
                                </a>

                                <form method="post"
                                      class="m-0"
                                      th:action="@{'/ui/admin/municipios/' + ${item.id} + '/excluir'}">
                                    <button type="submit"
                                            class="dropdown-item text-danger"
                                            onclick="return confirm('Excluir municipio?');">
                                        <i class="nav-link-icon lnr-trash mr-2"></i><span>Excluir</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</html>
