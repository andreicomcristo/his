<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout('HIS | Atendimentos Nao Identificados', ~{::section})}">
    <section>
        <style>
            .filtro-label {
                font-weight: 700;
            }
        </style>
        <div class="main-card card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title mb-0">Atendimentos Nao Identificados</h5>
                    <a th:href="@{/ui/atendimentos}" class="btn btn-outline-secondary btn-sm">Voltar para fila</a>
                </div>

                <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <form th:action="${listActionPath}" method="get" class="mb-3">
                    <div class="form-row">
                        <div class="form-group col-md-3">
                            <label for="nome" class="filtro-label">Nome</label>
                            <input id="nome" name="nome" type="text" class="form-control" th:value="${nome}">
                        </div>
                        <div class="form-group col-md-2">
                            <label for="cpf" class="filtro-label">CPF</label>
                            <input id="cpf" name="cpf" type="text" class="form-control" th:value="${cpf}">
                        </div>
                        <div class="form-group col-md-2">
                            <label for="tipoAtendimento" class="filtro-label">Tipo de atendimento</label>
                            <select id="tipoAtendimento" name="tipoAtendimento" class="form-control">
                                <option value="">TODOS</option>
                                <option th:each="item : ${tiposAtendimento}"
                                        th:value="${item.name()}"
                                        th:selected="${tipoAtendimentoSelecionado == item}"
                                        th:text="${item.name()}"></option>
                            </select>
                        </div>
                        <div class="form-group col-md-2">
                            <label for="statusId" class="filtro-label">Status</label>
                            <select id="statusId" name="statusId" class="form-control">
                                <option value="">TODOS</option>
                                <option th:each="item : ${statusAtendimentoOptions}"
                                        th:value="${item.id}"
                                        th:selected="${statusSelecionadoId == item.id}"
                                        th:text="${item.descricao}"></option>
                            </select>
                        </div>
                        <div class="form-group col-md-3">
                            <label for="areaEntradaId" class="filtro-label">Porta de entrada</label>
                            <select id="areaEntradaId" name="areaEntradaId" class="form-control">
                                <option value="">TODAS</option>
                                <option th:each="item : ${areasEntradaOptions}"
                                        th:value="${item.id}"
                                        th:selected="${areaEntradaSelecionadaId == item.id}"
                                        th:text="${item.nome}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-3">
                            <label for="dataInicio" class="filtro-label">Data inicio</label>
                            <input id="dataInicio" name="dataInicio" type="date" class="form-control" th:value="${dataInicio}">
                        </div>
                        <div class="form-group col-md-3">
                            <label for="dataFim" class="filtro-label">Data fim</label>
                            <input id="dataFim" name="dataFim" type="date" class="form-control" th:value="${dataFim}">
                        </div>
                        <div class="form-group col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary btn-block">Filtrar</button>
                        </div>
                        <div class="form-group col-md-2 d-flex align-items-end">
                            <a th:href="${listActionPath}" class="btn btn-outline-secondary btn-block">Limpar</a>
                        </div>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead>
                        <tr>
                            <th>Atendimento</th>
                            <th>Chegada</th>
                            <th>Paciente</th>
                            <th>Sexo</th>
                            <th>Idade aparente</th>
                            <th>Tipo</th>
                            <th>Status</th>
                            <th>Acoes</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(atendimentos)}">
                            <td colspan="8" class="text-center">Nenhum atendimento nao identificado em aberto</td>
                        </tr>
                        <tr th:each="a : ${atendimentos}">
                            <td th:text="${a.id}">0</td>
                            <td th:text="${#temporals.format(a.dataHoraChegada, 'dd/MM/yyyy HH:mm')}">-</td>
                            <td>
                                <span th:text="${a.paciente.nomeExibicao}">Paciente</span>
                                <span class="badge badge-warning ml-1" th:if="${a.paciente.temporario}">TEMPORARIO</span>
                                <div>
                                    <small class="text-muted">#<span th:text="${a.paciente.id}">0</span></small>
                                </div>
                            </td>
                            <td th:text="${a.paciente.sexo}">NI</td>
                            <td th:text="${a.paciente.idadeAparente != null ? a.paciente.idadeAparente : '-'}">-</td>
                            <td th:text="${a.tipoAtendimento}">-</td>
                            <td th:text="${a.status != null ? a.status.descricao : '-'}">-</td>
                            <td>
                                <a th:href="@{/ui/pacientes/{id}/identificar(id=${a.paciente.id}, atendimentoId=${a.id}, retorno='/ui/atendimentos/nao-identificados')}"
                                   class="btn btn-primary btn-sm">Identificar paciente</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</th:block>
</body>
</html>
