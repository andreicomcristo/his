spring.application.name=his
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:postgresql://localhost:5432/his
spring.datasource.username=postgres
spring.datasource.password=i1o05s
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
his.bootstrap.admin-sub=${HIS_BOOTSTRAP_ADMIN_SUB:bootstrap-admin-sub}
his.bootstrap.admin-username=${HIS_BOOTSTRAP_ADMIN_USERNAME:admin}
his.bootstrap.admin-email=${HIS_BOOTSTRAP_ADMIN_EMAIL:admin@his.local}
spring.flyway.placeholders.bootstrap_admin_sub=${his.bootstrap.admin-sub}
spring.flyway.placeholders.bootstrap_admin_username=${his.bootstrap.admin-username}
spring.flyway.placeholders.bootstrap_admin_email=${his.bootstrap.admin-email}

server.port=8080

# OAuth2 / Keycloak (OIDC)
# Ajuste por variaveis de ambiente para cada ambiente.
spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/master}
spring.security.oauth2.client.registration.keycloak.provider=keycloak
spring.security.oauth2.client.registration.keycloak.client-id=${KEYCLOAK_CLIENT_ID:his-web}
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:tSaCv6w2eE17cx9JQ26FOp38HTPRBnob}
spring.security.oauth2.client.registration.keycloak.client-authentication-method=${KEYCLOAK_CLIENT_AUTH_METHOD:client_secret_basic}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.client-name=Keycloak

# Keycloak Admin API (opcional para criacao de usuarios pelo HIS)
his.keycloak.admin.enabled=${HIS_KEYCLOAK_ADMIN_ENABLED:true}
his.keycloak.admin.server-url=${HIS_KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8081}
his.keycloak.admin.realm=${HIS_KEYCLOAK_ADMIN_REALM:master}
his.keycloak.admin.client-id=${HIS_KEYCLOAK_ADMIN_CLIENT_ID:${KEYCLOAK_CLIENT_ID:his-web}}
his.keycloak.admin.client-secret=${HIS_KEYCLOAK_ADMIN_CLIENT_SECRET:${KEYCLOAK_CLIENT_SECRET:tSaCv6w2eE17cx9JQ26FOp38HTPRBnob}}

# CADSUS / DATASUS (opcional para preenchimento por CPF)
